<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Dynamic Loader (GitHub Safe)</title>
    <style>
        body { margin: 0; }
        #app { width: 100%; height: 100%; }
    </style>

    <script>
        async function loadPage() {
            const hash = location.hash.slice(1).trim();
            if (!hash) return;

            try {
                const pages = await fetch("/pages.json").then(r => r.json());

                let entry = pages.pages?.[hash];
                if (!entry) return show404();

                // Router helper
                if (entry["url-to-hide-html-url"]) {
                    const helper = pages.pages?.[entry["url-to-hide-html-url"]];
                    if (helper) entry = helper;
                    else return show404();
                }

                const target = entry.url || entry.fileurl;
                if (!target) return show404();

                // Always treat as root-relative path unless it's http(s)
                let finalURL = target;
                if (!/^https?:\/\//.test(target)) {
                    finalURL = "/" + target.replace(/^\/+/, "");
                }

                // Fetch HTML as text
                const html = await fetch(finalURL).then(r => {
                    if (!r.ok) throw new Error("Fetch failed");
                    return r.text();
                });

                // Instead of replacing the document (which triggers navigation),
                // we inject the HTML into a sandboxed iframe.
                const iframe = document.getElementById("app");
                const doc = iframe.contentWindow.document;

                doc.open();
                doc.write(html);
                doc.close();

            } catch (e) {
                show404();
            }
        }

        async function show404() {
            const iframe = document.getElementById("app");
            const doc = iframe.contentWindow.document;

            try {
                const html = await fetch("/404.html").then(r => r.text());
                doc.open();
                doc.write(html);
                doc.close();
            } catch {
                doc.open();
                doc.write("<h1>404 - Page Not Found</h1>");
                doc.close();
            }
        }

        window.addEventListener("hashchange", loadPage);
        window.addEventListener("DOMContentLoaded", loadPage);
    </script>
</head>

<body>
    <!-- Sandboxed iframe prevents GitHub Pages from hijacking navigation -->
    <iframe id="app" sandbox="allow-same-origin allow-scripts" style="border:0;width:100%;height:100vh;"></iframe>
</body>
</html>
