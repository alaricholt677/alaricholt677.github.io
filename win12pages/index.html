<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Loading...</title>

<style>
    * {
        box-sizing: border-box;
    }

    html, body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: "Segoe UI", Arial, sans-serif;
        color: white;
        background: #05070f;
    }

    body {
        background:
            radial-gradient(circle at 20% 20%, rgba(77, 163, 255, 0.25), transparent 30%),
            radial-gradient(circle at 80% 30%, rgba(180, 77, 255, 0.22), transparent 35%),
            radial-gradient(circle at 50% 80%, rgba(77, 255, 196, 0.16), transparent 30%),
            linear-gradient(135deg, #05070f, #0b1020, #05070f);
        background-size: 200% 200%;
        animation: backgroundShift 12s ease infinite;
    }

    @keyframes backgroundShift {
        0% {
            background-position: 0% 50%;
        }
        50% {
            background-position: 100% 50%;
        }
        100% {
            background-position: 0% 50%;
        }
    }

    .orb {
        position: fixed;
        border-radius: 50%;
        filter: blur(8px);
        opacity: 0.45;
        pointer-events: none;
        z-index: 1;
        animation: floatOrb 10s ease-in-out infinite;
    }

    .orb.one {
        width: 180px;
        height: 180px;
        left: 8%;
        top: 12%;
        background: #4da3ff;
        animation-delay: 0s;
    }

    .orb.two {
        width: 260px;
        height: 260px;
        right: 8%;
        top: 18%;
        background: #b84dff;
        animation-delay: 2s;
    }

    .orb.three {
        width: 220px;
        height: 220px;
        left: 42%;
        bottom: 8%;
        background: #4dffc4;
        animation-delay: 4s;
    }

    @keyframes floatOrb {
        0%, 100% {
            transform: translateY(0) scale(1);
        }
        50% {
            transform: translateY(-35px) scale(1.08);
        }
    }

    #loader {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(5, 7, 15, 0.55);
        backdrop-filter: blur(18px);
        z-index: 999;
        opacity: 1;
        transition: opacity 0.6s ease, visibility 0.6s ease;
    }

    #loader.hidden {
        opacity: 0;
        visibility: hidden;
    }

    .loader-card {
        position: relative;
        width: min(90vw, 380px);
        padding: 42px 34px;
        text-align: center;
        border-radius: 28px;
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.18);
        box-shadow:
            0 25px 80px rgba(0, 0, 0, 0.45),
            inset 0 0 30px rgba(255, 255, 255, 0.04);
        overflow: hidden;
        animation: cardEnter 0.9s cubic-bezier(.2,.9,.2,1);
    }

    .loader-card::before {
        content: "";
        position: absolute;
        inset: -2px;
        background: linear-gradient(
            120deg,
            transparent,
            rgba(77, 163, 255, 0.45),
            rgba(184, 77, 255, 0.45),
            rgba(77, 255, 196, 0.35),
            transparent
        );
        background-size: 300% 300%;
        z-index: -1;
        animation: borderGlow 4s linear infinite;
    }

    @keyframes cardEnter {
        from {
            transform: translateY(30px) scale(0.94);
            opacity: 0;
        }
        to {
            transform: translateY(0) scale(1);
            opacity: 1;
        }
    }

    @keyframes borderGlow {
        0% {
            background-position: 0% 50%;
        }
        100% {
            background-position: 300% 50%;
        }
    }

    .spinner-wrap {
        position: relative;
        width: 96px;
        height: 96px;
        margin: 0 auto 24px;
    }

    .spinner {
        width: 96px;
        height: 96px;
        border-radius: 50%;
        border: 7px solid rgba(255,255,255,0.08);
        border-top-color: #4da3ff;
        border-right-color: #b84dff;
        animation: spin 0.9s linear infinite;
        box-shadow:
            0 0 30px rgba(77, 163, 255, 0.35),
            0 0 60px rgba(184, 77, 255, 0.18);
    }

    .spinner-wrap::after {
        content: "";
        position: absolute;
        inset: 22px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(255,255,255,0.95), rgba(77,163,255,0.4), transparent 65%);
        animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes spin {
        to {
            transform: rotate(360deg);
        }
    }

    @keyframes pulse {
        0%, 100% {
            transform: scale(0.75);
            opacity: 0.45;
        }
        50% {
            transform: scale(1);
            opacity: 1;
        }
    }

    .loading-title {
        margin: 0;
        font-size: 30px;
        font-weight: 800;
        letter-spacing: 0.5px;
        background: linear-gradient(90deg, #ffffff, #4da3ff, #b84dff, #4dffc4, #ffffff);
        background-size: 300% auto;
        color: transparent;
        -webkit-background-clip: text;
        background-clip: text;
        animation: textShine 3s linear infinite;
    }

    @keyframes textShine {
        to {
            background-position: 300% center;
        }
    }

    .loading-subtitle {
        margin-top: 10px;
        font-size: 15px;
        opacity: 0.72;
        animation: softBlink 1.8s ease-in-out infinite;
    }

    @keyframes softBlink {
        0%, 100% {
            opacity: 0.45;
        }
        50% {
            opacity: 0.9;
        }
    }

    .dots span {
        display: inline-block;
        animation: dotBounce 1.2s ease-in-out infinite;
    }

    .dots span:nth-child(2) {
        animation-delay: 0.15s;
    }

    .dots span:nth-child(3) {
        animation-delay: 0.3s;
    }

    @keyframes dotBounce {
        0%, 80%, 100% {
            transform: translateY(0);
            opacity: 0.35;
        }
        40% {
            transform: translateY(-5px);
            opacity: 1;
        }
    }

    #appframe {
        position: relative;
        z-index: 2;
        width: 100vw;
        height: 100vh;
        border: none;
        background: transparent;
        opacity: 0;
        transform: scale(1.015);
        transition:
            opacity 0.65s ease,
            transform 0.65s ease;
    }

    #appframe.visible {
        opacity: 1;
        transform: scale(1);
    }
</style>

<script>
async function loadPage() {
    const hash = location.hash.slice(1);
    const frame = document.getElementById("appframe");

    showLoader(true);
    frame.classList.remove("visible");

    try {
        const pages = await fetch("pages.json").then(response => {
            if (!response.ok) throw new Error("Could not load pages.json");
            return response.json();
        });

        let entry = pages.pages && pages.pages[hash];

        if (!entry) {
            show404();
            return;
        }

        if (entry["url-to-hide-html-url"]) {
            const helper = pages.pages[entry["url-to-hide-html-url"]];

            if (helper) {
                entry = helper;
            } else {
                show404();
                return;
            }
        }

        const target = entry.url || entry.fileurl;

        if (!target) {
            show404();
            return;
        }

        const res = await fetch(target);

        if (!res.ok) {
            show404();
            return;
        }

        const html = await res.text();

        frame.onload = () => {
            frame.classList.add("visible");
            showLoader(false);
        };

        frame.srcdoc = html;

    } catch (error) {
        show404();
    }
}

function show404() {
    const frame = document.getElementById("appframe");

    frame.srcdoc = `
        <!DOCTYPE html>
        <html>
        <head>
        <style>
            * {
                box-sizing: border-box;
            }

            body {
                margin: 0;
                min-height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
                overflow: hidden;
                background:
                    radial-gradient(circle at 20% 20%, rgba(255, 77, 77, 0.25), transparent 32%),
                    radial-gradient(circle at 80% 80%, rgba(77, 163, 255, 0.18), transparent 35%),
                    linear-gradient(135deg, #05070f, #111827, #05070f);
                font-family: "Segoe UI", Arial, sans-serif;
                color: white;
            }

            .error-box {
                position: relative;
                width: min(90vw, 520px);
                padding: 46px 36px;
                text-align: center;
                border-radius: 30px;
                background: rgba(255, 255, 255, 0.08);
                border: 1px solid rgba(255, 255, 255, 0.18);
                backdrop-filter: blur(18px);
                box-shadow: 0 30px 90px rgba(0,0,0,0.45);
                animation: popIn 0.75s cubic-bezier(.2,.9,.2,1);
            }

            @keyframes popIn {
                from {
                    opacity: 0;
                    transform: translateY(30px) scale(0.92);
                }
                to {
                    opacity: 1;
                    transform: translateY(0) scale(1);
                }
            }

            h1 {
                margin: 0;
                font-size: 96px;
                line-height: 1;
                font-weight: 900;
                color: transparent;
                background: linear-gradient(90deg, #ff4d4d, #ffb84d, #4da3ff, #ff4d4d);
                background-size: 300% auto;
                -webkit-background-clip: text;
                background-clip: text;
                animation: glowText 3s linear infinite;
            }

            @keyframes glowText {
                to {
                    background-position: 300% center;
                }
            }

            p {
                margin: 18px 0 28px;
                font-size: 18px;
                opacity: 0.78;
            }

            button {
                border: none;
                padding: 13px 24px;
                border-radius: 999px;
                color: white;
                font-size: 15px;
                font-weight: 700;
                cursor: pointer;
                background: linear-gradient(90deg, #4da3ff, #b84dff);
                box-shadow: 0 12px 35px rgba(77, 163, 255, 0.3);
                transition: transform 0.25s ease, box-shadow 0.25s ease;
            }

            button:hover {
                transform: translateY(-3px) scale(1.04);
                box-shadow: 0 18px 45px rgba(184, 77, 255, 0.42);
            }
        </style>
        </head>

        <body>
            <div class="error-box">
                <h1>404</h1>
                <p>The page you're looking for disappeared into the animation universe.</p>
                <button onclick="parent.location.hash = ''">Go Home</button>
            </div>
        </body>
        </html>
    `;

    frame.classList.add("visible");
    showLoader(false);
}

function showLoader(state) {
    const loader = document.getElementById("loader");

    if (state) {
        loader.classList.remove("hidden");
    } else {
        loader.classList.add("hidden");
    }
}

window.addEventListener("hashchange", loadPage);
window.addEventListener("DOMContentLoaded", loadPage);
</script>

</head>

<body>

<div class="orb one"></div>
<div class="orb two"></div>
<div class="orb three"></div>

<div id="loader">
    <div class="loader-card">
        <div class="spinner-wrap">
            <div class="spinner"></div>
        </div>

        <h1 class="loading-title">Loading</h1>

        <div class="loading-subtitle">
            Building something beautiful
            <span class="dots">
                <span>.</span><span>.</span><span>.</span>
            </span>
        </div>
    </div>
</div>

<iframe id="appframe" sandbox="allow-scripts allow-same-origin"></iframe>

</body>
</html>
