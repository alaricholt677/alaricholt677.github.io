<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Spudzy Studio V5 — Everything</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <script src="https://alaricholt677.github.io/PKGS/spudzy/spudzy.js"></script>
  <script src="https://alaricholt677.github.io/PKGS/spudzy-vid/spudzy-vid-js.js"></script>
  <script src="https://alaricholt677.github.io/PKGS/music-spud/spudzy-music-ai.js"></script>
  <style>
    :root{--bg:#131314;--surface:#1e1f20;--panel:#17181b;--border:#374151;--text:#e5e7eb;--muted:#9ca3af;--blue:#2563eb;--purple:#7c3aed;--red:#ef4444}
    *{box-sizing:border-box}body{margin:0;height:100vh;overflow:hidden;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif}.surface{background:var(--surface)}.glass{background:linear-gradient(180deg,rgba(31,41,55,.85),rgba(17,24,39,.96));border:1px solid rgba(148,163,184,.18);box-shadow:0 20px 60px rgba(0,0,0,.35)}::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-thumb{background:#4b5563;border-radius:999px}.asset-card:hover,.note-row:hover{border-color:#60a5fa;transform:translateY(-1px)}.pill{border-radius:999px}.soft{border:1px solid var(--border);background:#111827}.btn{border-radius:12px;padding:.55rem .8rem;font-weight:700}.btn-blue{background:#2563eb}.btn-gray{background:#374151}.btn-purple{background:#7c3aed}.btn-red{background:#7f1d1d}@media(min-width:980px){#sidebar{position:relative;transform:translateX(0)!important}#sidebar-overlay{display:none!important}#asset-sidebar{position:relative;transform:translateX(0)!important}.desktop-pad{padding-left:4rem;padding-right:4rem}.mobile-only{display:none!important}}@media(max-width:979px){.desktop-only{display:none!important}}
  </style>
</head>
<body class="flex text-sm">
  <div id="sidebar-overlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black/60 z-20 hidden"></div>

  <aside id="sidebar" class="surface w-80 h-full flex flex-col absolute z-30 transform -translate-x-full border-r border-gray-800 shrink-0">
    <div class="p-4 border-b border-gray-800 flex items-center justify-between">
      <div class="font-bold text-lg"><i class="fa-solid fa-sparkles text-blue-400 mr-2"></i>Spudzy Studio V5</div>
      <button onclick="toggleSidebar()" class="mobile-only"><i class="fa-solid fa-xmark"></i></button>
    </div>

    <div class="p-3 border-b border-gray-800 space-y-3">
      <button onclick="navigate('#chat/new')" class="w-full bg-[#2a2b2f] hover:bg-[#33353a] px-4 py-3 rounded-2xl text-left"><i class="fa-solid fa-plus mr-2"></i>New Chat</button>
      <input id="chat-search" oninput="renderSidebar()" placeholder="Search chat names + contents..." class="w-full soft rounded-xl px-3 py-2 outline-none" />
    </div>

    <div class="p-3 border-b border-gray-800 space-y-2">
      <div class="flex justify-between items-center px-2"><h3 class="text-[11px] font-bold text-gray-400 uppercase">Full Notebooks</h3><button onclick="openWikiModal()" class="text-blue-400 text-xs"><i class="fa-solid fa-search"></i> Wiki</button></div>
      <div class="grid grid-cols-2 gap-2">
        <button onclick="openNotebookEditor()" class="btn btn-gray text-xs"><i class="fa-solid fa-plus mr-1"></i>New Note</button>
        <button onclick="openNotebookImport()" class="btn btn-gray text-xs"><i class="fa-solid fa-file-import mr-1"></i>Import</button>
        <button onclick="exportNotebooks()" class="btn btn-gray text-xs"><i class="fa-solid fa-file-export mr-1"></i>Export</button>
        <button onclick="document.getElementById('notebook-json-file').click()" class="btn btn-gray text-xs"><i class="fa-solid fa-upload mr-1"></i>Load JSON</button>
      </div>
      <input id="notebook-json-file" type="file" accept="application/json" class="hidden" onchange="importNotebookJsonFile(event)" />
      <input id="notebook-search" oninput="renderNotebooks()" placeholder="Search notebooks..." class="w-full soft rounded-xl px-3 py-2 outline-none" />
      <div id="notebook-list" class="max-h-56 overflow-y-auto space-y-1"></div>
    </div>

    <div class="p-3 flex-1 overflow-y-auto">
      <div class="flex justify-between px-2 mb-2"><h3 class="text-[11px] font-bold text-gray-400 uppercase">Chats</h3><button onclick="deleteCurrentChat()" class="text-gray-500 hover:text-red-400"><i class="fa-solid fa-trash"></i></button></div>
      <div id="chat-list" class="space-y-1"></div>
    </div>

    <div class="border-t border-red-900/60">
      <div onclick="toggleConsoleBody()" class="bg-red-950/80 px-3 py-2 flex justify-between cursor-pointer"><span class="text-red-400 text-[11px] font-bold">Console (<span id="err-count">0</span>)</span><i id="console-chevron" class="fa-solid fa-chevron-down text-red-400 text-xs"></i></div>
      <div id="error-list" class="hidden p-3 max-h-40 overflow-y-auto bg-[#1a1314]"><p class="text-[11px] text-gray-500 italic">No errors yet.</p></div>
    </div>
  </aside>

  <main class="flex-1 flex min-w-0 h-full">
    <section class="flex-1 flex flex-col relative min-w-0">
      <header class="h-14 px-4 border-b border-gray-800 flex items-center justify-between shrink-0">
        <div class="flex items-center gap-3 min-w-0">
          <button onclick="toggleSidebar()" class="mobile-only"><i class="fa-solid fa-bars"></i></button>
          <select id="model-select" onchange="updateInputPlaceholder()" class="surface border border-gray-700 rounded-lg px-3 py-1.5 outline-none"><option value="text">Spudzy Text / HTML</option><option value="image">Spudzy Image</option><option value="video">Spudzy Video</option><option value="music">Spudzy Music</option></select>
          <select id="music-signature" class="hidden surface border border-gray-700 rounded-lg px-3 py-1.5 outline-none"><option value="spudzy">spudzy</option><option value="chiptune">chiptune</option><option value="lofi">lofi</option><option value="trap">trap</option><option value="edm">edm</option><option value="ambient">ambient</option><option value="rock">rock</option></select>
        </div>
        <div id="api-status" class="text-[10px] text-gray-500 font-mono truncate"></div>
      </header>

      <div id="chat-container" class="flex-1 overflow-y-auto p-4 desktop-pad space-y-6 pb-48"></div>

      <div class="absolute bottom-0 w-full bg-gradient-to-t from-[#131314] via-[#131314] to-transparent pt-12 pb-4 px-4 desktop-pad">
        <div class="surface rounded-[24px] p-2 border border-gray-700">
          <textarea id="message-input" rows="1" oninput="autoResize(this)" class="w-full bg-transparent outline-none resize-none max-h-40 min-h-[44px] px-4 pt-3" placeholder="Ask Spudzy or paste escaped HTML..."></textarea>
          <textarea id="lyrics-input" rows="3" class="hidden w-full bg-[#131314] border border-gray-700 rounded-xl px-4 py-2 mb-2" placeholder="Optional lyrics for music mode..."></textarea>
          <div class="flex justify-between px-2 pb-1">
            <div class="flex gap-1"><button onclick="openAssetLibrary()" class="text-gray-400 hover:text-blue-400 p-2" title="Asset Library"><i class="fa-solid fa-box-archive"></i></button><button onclick="saveCurrentPromptAsNotebook()" class="text-gray-400 hover:text-blue-400 p-2" title="Save prompt to notebook"><i class="fa-solid fa-bookmark"></i></button></div>
            <button id="send-btn" onclick="sendMessage()" class="bg-blue-600 text-white rounded-full w-9 h-9 disabled:opacity-50"><i class="fa-solid fa-arrow-up"></i></button>
          </div>
        </div>
      </div>
    </section>

    <aside id="asset-sidebar" class="surface w-96 h-full flex flex-col absolute right-0 z-30 transform translate-x-full border-l border-gray-800 shrink-0">
      <div class="p-4 border-b border-gray-800 flex justify-between"><div><h2 class="font-bold">Asset Library</h2><p class="text-[10px] text-gray-500">Regenerates every chat revisit • no stored data links</p></div><button onclick="closeAssetLibrary()"><i class="fa-solid fa-xmark"></i></button></div>
      <div class="p-3 space-y-2 border-b border-gray-800"><input id="asset-search" oninput="renderAssetLibrary()" placeholder="Search item, prompt, group, chat..." class="w-full soft rounded-xl px-3 py-2"/><select id="asset-type-filter" onchange="renderAssetLibrary()" class="w-full soft rounded-xl px-3 py-2"><option value="all">All assets</option><option value="image">Images</option><option value="music">Music</option><option value="video">Videos</option><option value="html">HTML</option></select><button onclick="rebuildAssetLibrary(); regenerateCurrentChatAssets(true)" class="w-full bg-blue-600 rounded-xl px-3 py-2 font-bold">Rescan + Force Regenerate</button></div>
      <div id="asset-list" class="flex-1 overflow-y-auto p-3 space-y-3"></div>
    </aside>
  </main>

  <div id="preview-modal" class="fixed inset-0 bg-black/80 backdrop-blur z-[70] hidden items-center justify-center p-4"><div class="glass rounded-2xl w-full max-w-6xl max-h-[92vh] flex flex-col overflow-hidden"><div class="p-4 border-b border-gray-700 flex justify-between"><div><h3 id="preview-title" class="font-bold">Preview</h3><p id="preview-subtitle" class="text-xs text-gray-400"></p></div><button onclick="closePreview()"><i class="fa-solid fa-xmark"></i></button></div><div id="preview-body" class="p-4 overflow-y-auto"></div></div></div>

  <div id="wiki-modal" class="fixed inset-0 bg-black/80 backdrop-blur z-[75] hidden items-center justify-center p-4"><div class="surface w-full max-w-2xl rounded-2xl border border-gray-700 max-h-[85vh] flex flex-col"><div class="p-4 border-b border-gray-700 flex justify-between"><h2 class="font-bold"><i class="fa-brands fa-wikipedia-w mr-2"></i>Wiki Research</h2><button onclick="closeWikiModal()"><i class="fa-solid fa-xmark"></i></button></div><div class="p-4"><div class="flex gap-2 soft rounded-xl p-1"><input id="wiki-search-input" class="flex-1 bg-transparent px-3 outline-none" placeholder="Search a topic..."/><button onclick="searchWiki()" class="bg-blue-600 px-4 py-2 rounded-lg"><i class="fa-solid fa-search"></i></button></div></div><div id="wiki-results" class="flex-1 overflow-y-auto p-4"><p class="text-center text-gray-500 mt-8">Search Wikipedia to build notebooks.</p></div></div></div>

  <div id="import-modal" class="fixed inset-0 bg-black/80 backdrop-blur z-[75] hidden items-center justify-center p-4"><div class="surface w-full max-w-md rounded-2xl border border-gray-700 max-h-[75vh] flex flex-col"><div class="p-4 border-b border-gray-700 flex justify-between"><h2 class="font-bold">Import Notebook</h2><button onclick="closeNotebookImport()"><i class="fa-solid fa-xmark"></i></button></div><div id="import-list" class="flex-1 overflow-y-auto p-2"></div></div></div>

  <div id="notebook-editor-modal" class="fixed inset-0 bg-black/80 backdrop-blur z-[80] hidden items-center justify-center p-4"><div class="surface w-full max-w-2xl rounded-2xl border border-gray-700 max-h-[86vh] flex flex-col"><div class="p-4 border-b border-gray-700 flex justify-between"><h2 id="note-editor-title" class="font-bold">Notebook</h2><button onclick="closeNotebookEditor()"><i class="fa-solid fa-xmark"></i></button></div><div class="p-4 space-y-3"><input id="note-title-input" class="w-full soft rounded-xl px-3 py-2" placeholder="Notebook title"/><textarea id="note-content-input" rows="12" class="w-full soft rounded-xl px-3 py-2" placeholder="Notebook content"></textarea><input id="note-tags-input" class="w-full soft rounded-xl px-3 py-2" placeholder="tags, comma separated"/><div class="flex gap-2"><button onclick="saveNotebookFromEditor()" class="btn btn-blue">Save Notebook</button><button onclick="closeNotebookEditor()" class="btn btn-gray">Cancel</button></div></div></div></div>

  <script type="module">import { ImageSpudHighPriest } from "https://alaricholt677.github.io/PKGS/Image-spud/Imagener.js"; window.ImageSpudHighPriest = ImageSpudHighPriest;</script>
  <script>
    const IMAGE_URL="https://alaricholt677.github.io/PKGS/Image-spud/Imagener.js", CHAT_KEY="spudzy_v5_chats", ASSET_KEY="spudzy_v5_assets", NOTE_KEY="spudzy_v5_notebooks", TAU=Math.PI*2;
    let chats=safeJson(localStorage.getItem(CHAT_KEY),[]), assets=safeJson(localStorage.getItem(ASSET_KEY),[]), notebooks=safeJson(localStorage.getItem(NOTE_KEY),[]), currentChatId=null, imagePriest=null, spudzyTextApi=null, isWaiting=false, isRegeneratingAssets=false, errorCount=0, editingNotebookId=null, lastRegeneratedChatId=null;
    const runtimeAssetUrls = new Map(); // transient only: regenerated image/audio/video URLs are not persisted
    try{ if(window.Spudzy) spudzyTextApi=new Spudzy(); }catch(e){console.warn(e)}

    function safeJson(raw,fallback){try{return raw?JSON.parse(raw):fallback}catch{return fallback}} function uid(p="id"){return p+"_"+Date.now()+"_"+Math.random().toString(36).slice(2,8)} function clamp(v,a,b){return Math.max(a,Math.min(b,v))} function esc(s){return String(s??"").replace(/[&<>'"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","'":"&#39;",'"':"&quot;"}[c]))} function escAttr(s){return esc(s)} function stripGeneratedLinks(obj){const copy=JSON.parse(JSON.stringify(obj));const wipe=o=>{if(!o||typeof o!=='object')return;if(Array.isArray(o)){o.forEach(wipe);return;}for(const k of Object.keys(o)){if(['imageUrl','coverUrl','audioUrl','videoUrl'].includes(k))delete o[k];else wipe(o[k]);}};wipe(copy);return copy} function saveAll(){localStorage.setItem(CHAT_KEY,JSON.stringify(stripGeneratedLinks(chats)));localStorage.setItem(ASSET_KEY,JSON.stringify(stripGeneratedLinks(assets)));localStorage.setItem(NOTE_KEY,JSON.stringify(notebooks))} function getCurrentChat(){return chats.find(c=>c.id===currentChatId)} function setRuntimeUrl(id,key,value){if(!id)return;const cur=runtimeAssetUrls.get(id)||{};cur[key]=value;runtimeAssetUrls.set(id,cur)} function getRuntimeUrl(id,key,fallback=''){return (runtimeAssetUrls.get(id)||{})[key]||fallback}
    function logError(msg){errorCount++;document.getElementById('err-count').textContent=errorCount;const l=document.getElementById('error-list');if(l.textContent.includes('No errors'))l.innerHTML='';l.insertAdjacentHTML('beforeend',`<div class="border-l-2 border-red-500 pl-3 py-1"><p class="text-red-400 text-xs font-mono break-words">${esc(msg)}</p></div>`);toggleConsoleBody(true)} window.onerror=(m,u,line)=>{logError(`Line ${line}: ${m}`);return false}; window.addEventListener('unhandledrejection',e=>logError('Promise: '+e.reason));

    function init(){rebuildAssetLibrary();updateApiStatus();updateInputPlaceholder();window.addEventListener('hashchange',handleRouting);document.getElementById('message-input').addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage()}}); if(!location.hash) navigate(chats.length?'#chat/'+chats[0].id:'#chat/new'); else handleRouting()} function updateApiStatus(){document.getElementById('api-status').textContent=`Text ${window.Spudzy?'loaded':'missing'} • Image ${window.ImageSpudHighPriest?'loaded':'loading'} • Music ${window.SpudzyMusicAI?'loaded':'missing'}`; if(!window.ImageSpudHighPriest)setTimeout(updateApiStatus,700)}
    function updateInputPlaceholder(){const m=document.getElementById('model-select').value;document.getElementById('lyrics-input').classList.toggle('hidden',m!=='music');document.getElementById('music-signature').classList.toggle('hidden',m!=='music');document.getElementById('message-input').placeholder=m==='image'?'Describe an image...':m==='video'?'Describe a video...':m==='music'?'Describe a song...':'Ask Spudzy or paste escaped HTML...'}
    function navigate(h){location.hash=h} function handleRouting(){if(location.hash==='#chat/new')return createChat(); if(location.hash.startsWith('#chat/')){const id=location.hash.replace('#chat/','');if(chats.find(c=>c.id===id)){currentChatId=id;renderAll();setTimeout(()=>regenerateCurrentChatAssets(true),80)}else navigate(chats.length?'#chat/'+chats[0].id:'#chat/new')}} function createChat(){const c={id:uid('chat'),title:'New Conversation',messages:[]};chats.unshift(c);currentChatId=c.id;saveAll();location.hash='#chat/'+c.id;renderAll()} function deleteCurrentChat(){if(chats.length<=1)return alert('Cannot delete your only chat.');if(confirm('Delete this chat?')){chats=chats.filter(c=>c.id!==currentChatId);currentChatId=chats[0].id;saveAll();navigate('#chat/'+currentChatId)}}
    function renderAll(){renderSidebar();renderNotebooks();renderChat();renderAssetLibrary()} function renderSidebar(){const q=(document.getElementById('chat-search')?.value||'').toLowerCase(),list=document.getElementById('chat-list');const f=chats.filter(c=>!q||c.title.toLowerCase().includes(q)||JSON.stringify(c.messages).toLowerCase().includes(q));list.innerHTML=f.map(c=>`<button onclick="navigate('#chat/${c.id}')" class="w-full text-left px-3 py-2.5 rounded-xl truncate ${c.id===currentChatId?'bg-[#33353a] text-white':'text-gray-400 hover:bg-[#2a2b2f]'}"><i class="fa-regular fa-message mr-2"></i>${esc(c.title)}</button>`).join('')||'<p class="text-xs text-gray-500 p-2">No chats found.</p>'}
    function renderChat(){const box=document.getElementById('chat-container'),chat=getCurrentChat();box.innerHTML='';if(!chat)return;if(!chat.messages.length){box.innerHTML='<div class="h-full flex flex-col items-center justify-center text-gray-400"><div class="text-5xl mb-4">✨</div><h2 class="text-2xl text-gray-200 font-bold">Hello.</h2><p>Choose Text/HTML, Image, Video, or Music.</p></div>';return} chat.messages.forEach(m=>{const row=document.createElement('div');row.className='mb-4';row.innerHTML=m.role==='user'?`<div class="bg-[#2a2b2f] px-5 py-3 rounded-3xl rounded-br-md max-w-[85%] ml-auto whitespace-pre-wrap">${esc(m.text)}</div>`:`<div class="flex gap-3"><div class="w-8 h-8 bg-blue-600 rounded-full flex items-center justify-center shrink-0"><i class="fa-solid fa-sparkles text-xs"></i></div><div class="flex-1 min-w-0">${renderAi(m)}</div></div>`;box.appendChild(row)});box.scrollTo({top:box.scrollHeight,behavior:'smooth'})}
    function renderAi(m){if(m.type==='image')return`<div data-msg-id="${m.id}" class="space-y-3"><p>${esc(m.text)}</p><div data-regen-status class="hidden text-xs text-blue-300">Regenerating image...</div><img data-regenerated-image src="${getRuntimeUrl(m.assetId,'imageUrl',m.imageUrl||'')}" class="max-w-sm w-full rounded-2xl border border-gray-700 bg-black"><div class="flex gap-2"><button onclick="previewAsset('${m.assetId}')" class="btn btn-gray text-xs">Preview</button><a data-image-download href="${getRuntimeUrl(m.assetId,'imageUrl',m.imageUrl||'')}" download="spudzy-image.png" class="btn btn-blue text-xs">Download</a></div></div>`; if(m.type==='music')return musicPlayer(m); if(m.type==='html')return`<div class="bg-[#1e1f20] border border-gray-700 rounded-2xl p-3 max-w-sm"><p class="font-semibold">${esc(m.title||'HTML Asset')}</p><p class="text-xs text-gray-400 mt-1">${esc(m.text||'HTML app saved. Canvas fixed if needed.')}</p><div class="flex gap-2 mt-2"><button onclick="previewAsset('${m.assetId}')" class="btn btn-blue text-xs">Live Preview</button><button onclick="downloadHtmlAsset('${m.assetId}')" class="btn btn-gray text-xs">Download HTML</button></div></div>`; if(m.type==='video')return`<div><p>${esc(m.text||'Video asset created.')}</p><div id="vid-${m.id}" class="max-w-sm aspect-video bg-black rounded-2xl border border-gray-700 flex items-center justify-center text-blue-300">Generating video...</div></div>`;return`<div class="whitespace-pre-wrap text-gray-300">${esc(m.text)}</div>`}
    function musicPlayer(m){return`<div class="glass rounded-[28px] p-4 max-w-xl" data-msg-id="${m.id}"><div data-regen-status class="hidden text-xs text-blue-300 mb-2">Regenerating cover + music...</div><div class="flex gap-4"><img data-regenerated-cover src="${getRuntimeUrl(m.assetId,'coverUrl',m.coverUrl||'')}" class="w-28 h-28 rounded-2xl object-cover"><div class="flex-1 min-w-0"><p class="text-[10px] uppercase tracking-widest text-blue-300 font-bold">Spudzy Music AI</p><h3 class="text-xl font-bold truncate">${esc(m.title)}</h3><p class="text-xs text-gray-400 truncate">${esc(m.prompt)}</p><audio data-regenerated-audio src="${getRuntimeUrl(m.assetId,'audioUrl',m.audioUrl||'')}" controls class="w-full mt-3"></audio></div></div><div class="mt-4 grid grid-cols-2 md:grid-cols-4 gap-2"><button onclick="playMusicAsset('${m.assetId}')" class="btn btn-blue text-xs">Play Live</button><a href="${getRuntimeUrl(m.assetId,'audioUrl',m.audioUrl||'')}" download="${esc(m.title)}.wav" class="btn btn-gray text-xs text-center">Music</a><a href="${getRuntimeUrl(m.assetId,'coverUrl',m.coverUrl||'')}" download="${esc(m.title)}-cover.png" class="btn btn-gray text-xs text-center">Cover</a><button onclick="downloadMusicBundle('${m.assetId}')" class="btn btn-purple text-xs">Cover + Music MP4</button></div></div>`}

    async function sendMessage(){const input=document.getElementById('message-input'),text=input.value.trim();if(!text||isWaiting)return;const mode=document.getElementById('model-select').value,chat=getCurrentChat();if(!chat)return;if(!chat.messages.length)chat.title=text.slice(0,32)+(text.length>32?'...':'');chat.messages.push({id:uid('msg'),role:'user',text});input.value='';autoResize(input);isWaiting=true;document.getElementById('send-btn').disabled=true;saveAll();renderChat();try{if(mode==='image')await handleImage(text,chat);else if(mode==='music')await handleMusic(text,chat);else if(mode==='video')await handleVideo(text,chat);else await handleText(text,chat)}catch(e){console.error(e);chat.messages.push({id:uid('msg'),role:'ai',type:'text',text:'Error: '+e.message})}finally{isWaiting=false;document.getElementById('send-btn').disabled=false;saveAll();rebuildAssetLibrary();renderAll()}}
    async function getImagePriest(){if(!window.ImageSpudHighPriest){const mod=await import(IMAGE_URL);window.ImageSpudHighPriest=mod.ImageSpudHighPriest||mod.default} if(!imagePriest)imagePriest=new window.ImageSpudHighPriest();return imagePriest}
    async function handleImage(prompt,chat){const r=await(await getImagePriest()).generate(prompt),imageUrl=r.dataUri||r;const a=addAsset({type:'image',name:prompt.slice(0,40)||'Image',group:'images',prompt,chatId:chat.id,meta:r.promptSpec||{},regen:{kind:'image',prompt}});setRuntimeUrl(a.id,'imageUrl',imageUrl);chat.messages.push({id:uid('msg'),role:'ai',type:'image',text:'Image generated and saved to Asset Library. It will regenerate on revisit.',prompt,assetId:a.id})}
    async function handleMusic(prompt,chat){const lyrics=document.getElementById('lyrics-input').value.trim(),signature=document.getElementById('music-signature').value;const result=await generateMusicAsset(prompt,lyrics,signature);const a=addAsset({type:'music',name:result.name,group:'music',prompt,lyrics,signature,chatId:chat.id,meta:result.meta,regen:result.regen});setRuntimeUrl(a.id,'coverUrl',result.coverUrl);setRuntimeUrl(a.id,'audioUrl',result.audioUrl);chat.messages.push({id:uid('msg'),role:'ai',type:'music',title:result.name,prompt,lyrics,signature,assetId:a.id})}
    async function handleVideo(prompt,chat){const a=addAsset({type:'video',name:prompt.slice(0,40)||'Video',group:'videos',prompt,chatId:chat.id,videoUrl:null,regen:{kind:'video',prompt}});const id=uid('msg');chat.messages.push({id,role:'ai',type:'video',text:'Video requested and saved as an asset placeholder.',data:prompt,assetId:a.id});setTimeout(()=>generateVideoInto(a.id,prompt),150)}

    function playMusicAsset(id){const a=assets.find(x=>x.id===id);if(a&&window.SpudzyMusicAI)window.SpudzyMusicAI.play({prompt:a.prompt,lyrics:a.lyrics,signature:a.signature})} async function generateVideoInto(assetId,prompt){const box=document.getElementById('vid-'+(getCurrentChat()?.messages.find(m=>m.assetId===assetId)?.id||'')),api=window.RealLifeVideo||window.SpudzyVid||window.SpudzyVideo||window.spudzyVid||window.spudzyVideo;if(!api?.generate){if(box)box.textContent='Video library unavailable.';return}try{const r=await api.generate(prompt,{seconds:5,width:960,height:540}),url=typeof r==='string'?r:r.url,a=assets.find(x=>x.id===assetId);if(a){a.updatedAt=Date.now();setRuntimeUrl(a.id,'videoUrl',url)}saveAll();if(box)box.innerHTML=`<video src="${url}" controls class="w-full h-full rounded-2xl"></video>`}catch(e){if(box)box.textContent='Video failed: '+e.message}}
    async function regenerateCurrentChatAssets(force=true){if(isRegeneratingAssets)return;const chat=getCurrentChat();if(!chat)return;const targets=chat.messages.filter(m=>['image','music','html','video'].includes(m.type));if(!targets.length)return;isRegeneratingAssets=true;try{for(const m of targets){if(m.type==='image')await regenerateImage(m);else if(m.type==='music')await regenerateMusic(m);else if(m.type==='html')regenerateHtml(m);else if(m.type==='video')await generateVideoInto(m.assetId,m.data||m.prompt||m.text||'video')}saveAll();renderAssetLibrary()}catch(e){logError('Asset regeneration failed: '+e.message)}finally{isRegeneratingAssets=false}}
    async function regenerateImage(m){const box=document.querySelector(`[data-msg-id="${m.id}"]`);box?.querySelector('[data-regen-status]')?.classList.remove('hidden');try{const prompt=m.prompt||m.text||'image',r=await(await getImagePriest()).generate(prompt),url=r.dataUri||r;setRuntimeUrl(m.assetId,'imageUrl',url);const a=assets.find(x=>x.id===m.assetId);if(a){a.prompt=prompt;a.updatedAt=Date.now();a.meta=r.promptSpec||a.meta}const img=box?.querySelector('[data-regenerated-image]'),dl=box?.querySelector('[data-image-download]');if(img)img.src=url;if(dl)dl.href=url}finally{box?.querySelector('[data-regen-status]')?.classList.add('hidden')}} async function regenerateMusic(m){const box=document.querySelector(`[data-msg-id="${m.id}"]`);box?.querySelector('[data-regen-status]')?.classList.remove('hidden');try{const result=await generateMusicAsset(m.prompt||m.title||'music',m.lyrics||'',m.signature||'spudzy');setRuntimeUrl(m.assetId,'coverUrl',result.coverUrl);setRuntimeUrl(m.assetId,'audioUrl',result.audioUrl);const a=assets.find(x=>x.id===m.assetId);if(a)Object.assign(a,{type:'music',name:result.name,group:'music',prompt:result.prompt,lyrics:result.lyrics,signature:result.signature,meta:result.meta,regen:result.regen,updatedAt:Date.now()});const ci=box?.querySelector('[data-regenerated-cover]'),au=box?.querySelector('[data-regenerated-audio]');if(ci)ci.src=result.coverUrl;if(au){au.src=result.audioUrl;au.load()}}finally{box?.querySelector('[data-regen-status]')?.classList.add('hidden')}} function regenerateHtml(m){const fixed=fixGeneratedHtml(m.html||m.prompt||'');m.html=fixed;const a=assets.find(x=>x.id===m.assetId);if(a){a.html=fixed;a.updatedAt=Date.now()}}

    function renderNotebooks(){const q=(document.getElementById('notebook-search')?.value||'').toLowerCase(),l=document.getElementById('notebook-list');if(!l)return;const found=notebooks.filter(n=>!q||JSON.stringify(n).toLowerCase().includes(q));l.innerHTML=found.length?found.map(n=>{const i=notebooks.findIndex(x=>x.id===n.id);return`<div class="note-row flex items-center justify-between px-2 py-1.5 border border-transparent rounded-lg"><button onclick="previewNotebook(${i})" class="truncate text-left flex-1"><i class="fa-solid fa-book-open text-blue-400 mr-2 text-xs"></i>${esc(n.title)}</button><button onclick="openNotebookEditor('${n.id}')" class="text-blue-400 mx-1"><i class="fa-solid fa-pen text-xs"></i></button><button onclick="deleteNotebook(${i})" class="text-red-500"><i class="fa-solid fa-trash text-xs"></i></button></div>`}).join(''):'<p class="text-[10px] text-gray-600 px-2 italic">No notebooks yet.</p>'} function openNotebookEditor(id=null){editingNotebookId=id;const n=notebooks.find(x=>x.id===id)||{title:'',content:'',tags:[]};document.getElementById('note-title-input').value=n.title||'';document.getElementById('note-content-input').value=n.content||'';document.getElementById('note-tags-input').value=(n.tags||[]).join(', ');document.getElementById('notebook-editor-modal').classList.remove('hidden');document.getElementById('notebook-editor-modal').classList.add('flex')} function closeNotebookEditor(){document.getElementById('notebook-editor-modal').classList.add('hidden');document.getElementById('notebook-editor-modal').classList.remove('flex');editingNotebookId=null} function saveNotebookFromEditor(){const title=document.getElementById('note-title-input').value.trim()||'Untitled Notebook',content=document.getElementById('note-content-input').value,tags=document.getElementById('note-tags-input').value.split(',').map(x=>x.trim()).filter(Boolean);if(editingNotebookId){const n=notebooks.find(x=>x.id===editingNotebookId);Object.assign(n,{title,content,tags,updatedAt:Date.now()})}else notebooks.unshift({id:uid('note'),title,content,tags,source:'manual',createdAt:Date.now(),updatedAt:Date.now()});saveAll();renderNotebooks();closeNotebookEditor()} function saveCurrentPromptAsNotebook(){const val=document.getElementById('message-input').value.trim();if(!val)return alert('Type something first.');notebooks.unshift({id:uid('note'),title:val.slice(0,40)||'Prompt Note',content:val,tags:['prompt'],source:'prompt',createdAt:Date.now(),updatedAt:Date.now()});saveAll();renderNotebooks()}
    function openWikiModal(){document.getElementById('wiki-modal').classList.remove('hidden');document.getElementById('wiki-modal').classList.add('flex')} function closeWikiModal(){document.getElementById('wiki-modal').classList.add('hidden');document.getElementById('wiki-modal').classList.remove('flex')} async function searchWiki(){const q=document.getElementById('wiki-search-input').value.trim(),r=document.getElementById('wiki-results');if(!q)return;r.innerHTML='<p class="text-blue-400 text-center mt-8">Searching...</p>';try{const res=await fetch(`https://en.wikipedia.org/w/api.php?action=query&prop=extracts&exintro&explaintext&titles=${encodeURIComponent(q)}&format=json&origin=*`),data=await res.json(),pages=data.query.pages,id=Object.keys(pages)[0];if(id==='-1'){r.innerHTML='<p class="text-red-400 text-center">No results.</p>';return}const title=pages[id].title,extract=pages[id].extract||'';r.innerHTML=`<div class="bg-[#131314] p-5 rounded-xl"><h3 class="font-bold mb-2">${esc(title)}</h3><p class="whitespace-pre-wrap text-gray-300">${esc(extract)}</p><button id="save-wiki-btn" class="mt-4 btn btn-blue">Save to Notebook</button></div>`;document.getElementById('save-wiki-btn').onclick=()=>saveToNotebook(title,extract,'wiki')}catch(e){r.innerHTML='<p class="text-red-400">Failed.</p>'}} function saveToNotebook(title,content,source='manual'){notebooks.unshift({id:uid('note'),title,content,tags:[source],source,createdAt:Date.now(),updatedAt:Date.now()});saveAll();renderNotebooks();closeWikiModal()} function deleteNotebook(i){if(confirm('Delete this notebook?')){notebooks.splice(i,1);saveAll();renderNotebooks()}} function previewNotebook(i){const n=notebooks[i];if(!n)return;document.getElementById('preview-title').textContent=n.title;document.getElementById('preview-subtitle').textContent='notebook • '+(n.tags||[]).join(', ');document.getElementById('preview-body').innerHTML=`<pre class="whitespace-pre-wrap text-sm bg-[#111827] p-4 rounded-2xl">${esc(n.content)}</pre><div class="flex gap-2 mt-3"><button onclick="importText(notebooks[${i}].content)" class="btn btn-blue">Import to Prompt</button><button onclick="openNotebookEditor('${n.id}')" class="btn btn-gray">Edit</button></div>`;document.getElementById('preview-modal').classList.remove('hidden');document.getElementById('preview-modal').classList.add('flex')} function openNotebookImport(){const l=document.getElementById('import-list');l.innerHTML=notebooks.length?notebooks.map((n,i)=>`<button onclick="importText(notebooks[${i}].content)" class="w-full text-left p-3 hover:bg-[#2a2b2f] border-b border-gray-800"><b>${esc(n.title)}</b><p class="text-xs text-gray-500 truncate">${esc(n.content)}</p></button>`).join(''):'<p class="text-center text-gray-500 py-8">No notebooks.</p>';document.getElementById('import-modal').classList.remove('hidden');document.getElementById('import-modal').classList.add('flex')} function closeNotebookImport(){document.getElementById('import-modal').classList.add('hidden');document.getElementById('import-modal').classList.remove('flex')} function importText(t){const i=document.getElementById('message-input');i.value=`[Research Data]:\n${t}\n\n${i.value}`;autoResize(i);closeNotebookImport();closePreview();i.focus()} function exportNotebooks(){const url=URL.createObjectURL(new Blob([JSON.stringify(notebooks,null,2)],{type:'application/json'}));const a=document.createElement('a');a.href=url;a.download='spudzy-notebooks.json';a.click();setTimeout(()=>URL.revokeObjectURL(url),1000)} async function importNotebookJsonFile(e){const f=e.target.files[0];if(!f)return;const text=await f.text();const data=JSON.parse(text);if(!Array.isArray(data))return alert('JSON must be an array.');notebooks=[...data,...notebooks];saveAll();renderNotebooks();e.target.value=''}
    function toggleSidebar(){document.getElementById('sidebar').classList.toggle('-translate-x-full');document.getElementById('sidebar-overlay').classList.toggle('hidden')} function toggleConsoleBody(force=false){const l=document.getElementById('error-list'),c=document.getElementById('console-chevron');if(force||l.classList.contains('hidden')){l.classList.remove('hidden');c.classList.replace('fa-chevron-down','fa-chevron-up')}else{l.classList.add('hidden');c.classList.replace('fa-chevron-up','fa-chevron-down')}} function autoResize(e){e.style.height='auto';e.style.height=Math.min(e.scrollHeight,160)+'px'}
    Object.assign(window,{navigate,deleteCurrentChat,toggleSidebar,toggleConsoleBody,autoResize,sendMessage,updateInputPlaceholder,openAssetLibrary,closeAssetLibrary,renderAssetLibrary,rebuildAssetLibrary,previewAsset,closePreview,playMusicAsset,downloadMusicBundle,regenerateCurrentChatAssets,downloadHtmlAsset,copyHtmlAsset,renderNotebooks,openWikiModal,closeWikiModal,searchWiki,saveToNotebook,deleteNotebook,previewNotebook,openNotebookImport,closeNotebookImport,importText,openNotebookEditor,closeNotebookEditor,saveNotebookFromEditor,saveCurrentPromptAsNotebook,exportNotebooks,importNotebookJsonFile});
    init();
