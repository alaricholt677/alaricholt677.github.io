<body>
<div id="root" class="kern"></div>

<script>
(()=>{"use strict";

/* ========= Utils ========= */
const $=(s,e=document)=>e.querySelector(s);
const $$=(s,e=document)=>Array.from(e.querySelectorAll(s));
const now=()=>Date.now();
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const uid=()=>Math.random().toString(16).slice(2)+Math.random().toString(16).slice(2);
const fmtTime=()=>{const d=new Date();const h=d.getHours(),m=String(d.getMinutes()).padStart(2,"0");const ap=h>=12?"PM":"AM";const hh=((h+11)%12+1);return `${hh}:${m} ${ap}`;};
const extOf=(n)=>{const i=n.lastIndexOf(".");return i>0?n.slice(i).toLowerCase():"";};
const baseName=(n)=>{const i=n.lastIndexOf(".");return i>0?n.slice(0,i):n;};
const isHttp=(s)=>/^https?:\/\//i.test(s||"");
const escapeHtml=(s)=>String(s??"").replace(/[&<>"']/g,m=>({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[m]));

/* ========= Storage ========= */
const LS={
  kReg:"thiswin12_reg",kVfs:"thiswin12_vfs",kBak:"thiswin12_backup",
  loadJSON(k,f){try{const r=localStorage.getItem(k);if(!r)return f;const o=JSON.parse(r);return o&&typeof o==="object"?o:f;}catch{return f}},
  saveJSON(k,o){try{localStorage.setItem(k,JSON.stringify(o));}catch{}},
  snapshot(){try{localStorage.setItem(LS.kBak,JSON.stringify({t:now(),reg:localStorage.getItem(LS.kReg),vfs:localStorage.getItem(LS.kVfs)}));}catch{}},
  recoverIfNeeded(){
    const ok=(raw)=>{try{if(!raw)return false;const o=JSON.parse(raw);return o&&typeof o==="object";}catch{return false}};
    const regRaw=localStorage.getItem(LS.kReg), vfsRaw=localStorage.getItem(LS.kVfs);
    if(ok(regRaw)&&ok(vfsRaw)) return;
    const bak=LS.loadJSON(LS.kBak,null);
    if(bak&&ok(bak.reg)&&ok(bak.vfs)){localStorage.setItem(LS.kReg,bak.reg);localStorage.setItem(LS.kVfs,bak.vfs);}
    else{localStorage.removeItem(LS.kReg);localStorage.removeItem(LS.kVfs);}
  }
};

/* ========= OS ========= */
const OS={
  schema:1, root:$("#root"),
  reg:null, vfs:null,
  session:{user:null},
  proc:{nextPid:100, table:{}},
  wm:{nextZ:10, wins:{}},
  ui:{startOpen:false, qsOpen:false, widgetsOpen:false},
  settings:{wifi:true, bt:false, volume:70, brightness:80}
};
const hashPass=(s)=>{s=String(s||"");let h=2166136261>>>0;for(let i=0;i<s.length;i++){h^=s.charCodeAt(i);h=Math.imul(h,16777619);}return ("00000000"+(h>>>0).toString(16)).slice(-8);};

OS.loadAll=()=>{
  LS.recoverIfNeeded();
  OS.reg=LS.loadJSON(LS.kReg,null);
  OS.vfs=LS.loadJSON(LS.kVfs,null);
  if(!OS.reg||OS.reg.schemaVersion!==OS.schema){
    OS.reg={schemaVersion:OS.schema,users:[],currentUserId:null,settings:{wifi:true,bt:false,volume:70,brightness:80},chat:{threads:{}},browser:{bookmarks:{},history:{}}};
  }
  OS.settings=Object.assign(OS.settings,OS.reg.settings||{});
  if(!OS.vfs||typeof OS.vfs!=="object") OS.vfs={t:"d",c:{}};
  VFS.ensureDrive();
  OS.saveAll();
};
OS.saveAll=()=>{
  OS.reg.settings=Object.assign({},OS.settings);
  LS.snapshot();
  LS.saveJSON(LS.kReg,OS.reg);
  LS.saveJSON(LS.kVfs,OS.vfs);
};

/* ========= VFS =========
Node: {t:"d"|"f", c?:{}, data?:string, mime?:string, meta?:{mtime}}
*/
const VFS={
  normPath(p){
    if(!p) return "";
    p=p.replace(/^file:\/\/\//i,"").replace(/\\/g,"/").replace(/\/+/g,"/").trim();
    if(p.endsWith("/")&&p.length>3) p=p.slice(0,-1);
    return p;
  },
  split(p){return VFS.normPath(p).split("/").filter(Boolean);},
  ensureDrive(){
    if(!OS.vfs||typeof OS.vfs!=="object") OS.vfs={t:"d",c:{}};
    const c=OS.vfs.c||(OS.vfs.c={});
    if(!c["C:"]) c["C:"]={t:"d",c:{}};
    if(!c["C:"].c["Users"]) c["C:"].c["Users"]={t:"d",c:{}};
  },
  getNode(path){
    VFS.ensureDrive();
    const parts=VFS.split(path);
    let n=OS.vfs;
    for(const part of parts){
      if(!n||n.t!=="d") return null;
      n=n.c[part];
      if(!n) return null;
    }
    return n;
  },
  parentOf(path){
    const p=VFS.normPath(path);
    const parts=VFS.split(p);
    if(parts.length<=1) return {parent:null,name:parts[0]||""};
    const name=parts.pop();
    const parent=VFS.getNode(parts.join("/"));
    return {parent,name};
  },
  mkdir(path){
    VFS.ensureDrive();
    const parts=VFS.split(path);
    let n=OS.vfs;
    for(const part of parts){
      if(n.t!=="d") throw new Error("Not a directory");
      n.c=n.c||{};
      if(!n.c[part]) n.c[part]={t:"d",c:{}};
      n=n.c[part];
    }
    OS.saveAll();
  },
  writeFile(path,data="",mime="text/plain"){
    const {parent,name}=VFS.parentOf(path);
    if(!parent||parent.t!=="d") throw new Error("Bad path");
    parent.c=parent.c||{};
    parent.c[name]={t:"f",data:String(data),mime,meta:{mtime:now()}};
    OS.saveAll();
  },
  readFile(path){
    const n=VFS.getNode(path);
    if(!n||n.t!=="f") throw new Error("Not a file");
    return n.data||"";
  },
  list(path){
    const n=VFS.getNode(path);
    if(!n||n.t!=="d") throw new Error("Not a directory");
    const out=[];
    for(const [k,v] of Object.entries(n.c||{})) out.push({name:k,t:v.t,mime:v.mime||"",meta:v.meta||{}});
    out.sort((a,b)=>(a.t===b.t?a.name.localeCompare(b.name):(a.t==="d"?-1:1)));
    return out;
  },
  rm(path){
    const {parent,name}=VFS.parentOf(path);
    if(!parent||parent.t!=="d") throw new Error("Bad path");
    if(!parent.c||!parent.c[name]) throw new Error("Not found");
    delete parent.c[name];
    OS.saveAll();
  },
  rename(path,newName){
    newName=(newName||"").trim();
    if(!newName) throw new Error("Empty name");
    const {parent,name}=VFS.parentOf(path);
    if(!parent||parent.t!=="d") throw new Error("Bad path");
    if(!parent.c[name]) throw new Error("Not found");
    if(parent.c[newName]) throw new Error("Name exists");
    parent.c[newName]=parent.c[name];
    delete parent.c[name];
    OS.saveAll();
  },
  search(query){
    query=(query||"").trim().toLowerCase();
    if(!query) return [];
    const res=[];
    const walk=(node,path)=>{
      if(!node) return;
      if(node.t==="d"){
        for(const [k,v] of Object.entries(node.c||{})){
          const p=path?`${path}/${k}`:k;
          if(k.toLowerCase().includes(query)) res.push({path:p,t:v.t});
          walk(v,p);
        }
      }
    };
    walk(OS.vfs,"");
    return res.slice(0,80);
  },
  cloneNode(node){
    if(!node) return null;
    if(node.t==="f") return {t:"f",data:String(node.data||""),mime:node.mime||"text/plain",meta:Object.assign({},node.meta||{})};
    const out={t:"d",c:{}};
    for(const [k,v] of Object.entries(node.c||{})) out.c[k]=VFS.cloneNode(v);
    return out;
  },
  mergeIntoDir(targetDirNode, incomingDirNode, mode){
    // mode: "merge" (skip conflicts) | "overwrite"
    if(!targetDirNode||targetDirNode.t!=="d"||!incomingDirNode||incomingDirNode.t!=="d") throw new Error("Bad merge");
    targetDirNode.c=targetDirNode.c||{};
    for(const [name,inNode] of Object.entries(incomingDirNode.c||{})){
      const ex=targetDirNode.c[name];
      if(!ex){
        targetDirNode.c[name]=VFS.cloneNode(inNode);
        continue;
      }
      if(mode==="merge") continue;
      // overwrite
      if(inNode.t==="d" && ex.t==="d"){
        VFS.mergeIntoDir(ex,inNode,"overwrite");
      }else{
        targetDirNode.c[name]=VFS.cloneNode(inNode);
      }
    }
  }
};

/* ========= Proc ========= */
const Proc={
  start(name,fn,args={}){
    const existing=Object.values(OS.proc.table).find(p=>p.name===name&&p.status==="running");
    if(existing) return existing.pid;
    const pid=OS.proc.nextPid++;
    OS.proc.table[pid]={pid,name,status:"running",startTime:now(),windowsOwned:[]};
    try{fn(args,pid);}catch(e){console.error(e);}
    return pid;
  },
  stop(pid){
    const p=OS.proc.table[pid]; if(!p) return;
    p.status="stopped";
    (p.windowsOwned||[]).forEach(wid=>WM.close(wid,true));
    delete OS.proc.table[pid];
  },
  isRunning(name){return !!Object.values(OS.proc.table).find(p=>p.name===name&&p.status==="running");},
  list(){return Object.values(OS.proc.table).sort((a,b)=>a.pid-b.pid);}
};

/* ========= WM ========= */
const WM={
  create({pid,appId,title,w=720,h=520,x=120,y=120,content,onFocus,onClose}){
    const wid=uid();
    const win=document.createElement("div");
    win.className="win glass";
    win.style.width=w+"px";win.style.height=h+"px";win.style.left=x+"px";win.style.top=y+"px";
    win.dataset.wid=wid;
    const tb=document.createElement("div");
    tb.className="titlebar";
    tb.innerHTML=`
      <div class="badge mono">${appId}</div>
      <div class="title">${title}</div>
      <div class="wbtn" data-act="min" title="Minimize">—</div>
      <div class="wbtn" data-act="max" title="Maximize">▢</div>
      <div class="wbtn close" data-act="close" title="Close">✕</div>
    `;
    const body=document.createElement("div");
    body.className="body";
    if(content) body.appendChild(content);
    win.appendChild(tb);win.appendChild(body);
    OS.root.appendChild(win);
    OS.wm.wins[wid]={wid,pid,appId,title,el:win,body,tb,max:false,min:false,onFocus,onClose};
    OS.proc.table[pid]?.windowsOwned.push(wid);
    WM.focus(wid);
    WM.makeDraggable(wid,tb);
    WM.hookButtons(wid);
    win.addEventListener("mousedown",()=>WM.focus(wid));
    return wid;
  },
  focus(wid){
    const w=OS.wm.wins[wid]; if(!w) return;
    OS.wm.nextZ++; w.el.style.zIndex=OS.wm.nextZ;
    for(const ww of Object.values(OS.wm.wins)) ww.el.classList.toggle("focus",ww.wid===wid);
    w.onFocus&&w.onFocus();
  },
  close(wid,silent=false){
    const w=OS.wm.wins[wid]; if(!w) return;
    if(!silent && w.onClose && w.onClose()===false) return;
    w.el.remove(); delete OS.wm.wins[wid];
  },
  minimize(wid){const w=OS.wm.wins[wid]; if(!w) return; w.min=!w.min; w.el.style.display=w.min?"none":"block";},
  maximize(wid){
    const w=OS.wm.wins[wid]; if(!w) return;
    w.max=!w.max;
    if(w.max){
      w._pre={l:w.el.style.left,t:w.el.style.top,w:w.el.style.width,h:w.el.style.height};
      w.el.style.left="4vw";w.el.style.top="72px";w.el.style.width="92vw";w.el.style.height="calc(86vh - 72px)";
    }else if(w._pre){
      w.el.style.left=w._pre.l;w.el.style.top=w._pre.t;w.el.style.width=w._pre.w;w.el.style.height=w._pre.h;
    }
  },
  hookButtons(wid){
    const w=OS.wm.wins[wid];
    w.tb.addEventListener("click",(e)=>{
      const act=e.target?.dataset?.act; if(!act) return;
      if(act==="close") WM.close(wid);
      if(act==="min") WM.minimize(wid);
      if(act==="max") WM.maximize(wid);
    });
  },
  makeDraggable(wid,handle){
    const w=OS.wm.wins[wid];
    let drag=false,ox=0,oy=0;
    handle.addEventListener("mousedown",(e)=>{
      if(e.target?.dataset?.act) return;
      drag=true; WM.focus(wid);
      const r=w.el.getBoundingClientRect();
      ox=e.clientX-r.left; oy=e.clientY-r.top;
      e.preventDefault();
    });
    window.addEventListener("mousemove",(e)=>{
      if(!drag||w.max) return;
      const nx=clamp(e.clientX-ox,8,window.innerWidth-80);
      const ny=clamp(e.clientY-oy,8,window.innerHeight-80);
      w.el.style.left=nx+"px"; w.el.style.top=ny+"px";
    });
    window.addEventListener("mouseup",()=>drag=false);
  }
};

/* ========= Toast ========= */
const Toast={
  el:null,
  ensure(){
    if(Toast.el) return;
    const d=document.createElement("div");
    d.style.position="fixed";d.style.left="50%";d.style.bottom="92px";d.style.transform="translateX(-50%)";
    d.style.zIndex=9997;d.style.pointerEvents="none";
    OS.root.appendChild(d);Toast.el=d;
  },
  show(msg){
    Toast.ensure();
    const b=document.createElement("div");
    b.className="glass pill";
    b.style.padding="10px 12px";b.style.marginTop="8px";
    b.style.border="1px solid rgba(255,255,255,.14)";
    b.style.background="rgba(0,0,0,.28)";
    b.style.fontSize="12px";b.style.color="rgba(234,240,255,.92)";
    b.textContent=msg;
    Toast.el.appendChild(b);
    setTimeout(()=>{b.style.opacity="0";b.style.transition="opacity .25s";},1600);
    setTimeout(()=>b.remove(),2000);
  }
};

/* ========= Context Menu ========= */
const Ctx = {
  el: null,
  close() { if (Ctx.el) { Ctx.el.remove(); Ctx.el = null; } },

  open(x, y, items) {
    Ctx.close();
    const m = document.createElement("div");
    m.className = "ctx glass";
    m.style.left = x + "px";
    m.style.top  = y + "px";

    items.forEach(it => {
      const d = document.createElement("div");
      d.className = "citem";
      d.textContent = it.label;
      d.addEventListener("click", () => {
        Ctx.close();
        it.onClick && it.onClick();
      });
      m.appendChild(d);
    });

    OS.root.appendChild(m);
    Ctx.el = m;

    // 👇 close only if the mousedown target is NOT inside the menu
    const onDown = (e) => {
      if (Ctx.el && Ctx.el.contains(e.target)) return;
      Ctx.close();
      window.removeEventListener("mousedown", onDown, true);
    };

    // capture phase makes this robust even if other handlers stop bubbling
    window.addEventListener("mousedown", onDown, true);
  }
};

/* ========= File Associations ========= */
const FileAssoc={
  openPath(path){
    if(!Proc.isRunning("file_associations.exe")) return Toast.show("file_associations.exe is not running.");
    path=VFS.normPath(path);
    const n=VFS.getNode(path);
    if(!n) return Toast.show("Not found: "+path);
    if(n.t==="d") return Apps.FileExplorer.open({path});
    return FileAssoc.openFile(path);
  },
  openFile(path){
    if(!Proc.isRunning("file_associations.exe")) return Toast.show("file_associations.exe is not running.");
    const name=path.split("/").pop();
    const ext=extOf(name);
    if(isHttp(name) || isHttp(VFS.getNode(path)?.data)) return Apps.Notepad.open({path,forceText:true});
    if(ext===".webpagefile") return Apps.Browser.open({path});
    if(ext===".mp4"||ext===".mp3") return Apps.Media.open({path});
    if(ext===".png"||ext===".jpg"||ext===".jpeg") return Apps.Photos.open({path});
    if(ext===".txt") return Apps.Notepad.open({path});
    return Apps.Notepad.open({path,forceText:true});
  }
};

/* ========= Draggable helper ========= */
function makeDraggable(el,opts={}){
  let drag=false,ox=0,oy=0;
  const clampY=opts.clampY||[8,window.innerHeight-8];
  el.addEventListener("mousedown",(e)=>{
    if(e.target.closest("input,button,textarea")) return;
    drag=true;
    const r=el.getBoundingClientRect();
    ox=e.clientX-r.left; oy=e.clientY-r.top;
    e.preventDefault();
  });
  window.addEventListener("mousemove",(e)=>{
    if(!drag) return;
    el.style.transform="none";
    const nx=clamp(e.clientX-ox,8,window.innerWidth-el.offsetWidth-8);
    const ny=clamp(e.clientY-oy,clampY[0],clampY[1]-el.offsetHeight);
    el.style.left=nx+"px"; el.style.top=ny+"px";
  });
  window.addEventListener("mouseup",()=>drag=false);
}

/* ========= Import/Export ========= */
const IO={
  exportPath(path, includeReg=false){
    path=VFS.normPath(path);
    const node=VFS.getNode(path);
    if(!node) return Toast.show("Export failed: path not found");
    const payload={
      type:"thiswin12-export",
      version:1,
      exportedAt:new Date().toISOString(),
      rootPath:path,
      node:VFS.cloneNode(node),
      reg: includeReg ? OS.reg : null
    };
    const blob=new Blob([JSON.stringify(payload,null,2)],{type:"application/json"});
    const a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    const safe=path.replace(/[^\w\-.:/]/g,"_").replace(/\//g,"_");
    a.download=`ThisWin12_${safe||"export"}.tw12.json`;
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(a.href),1500);
    Toast.show("Export started (download).");
  },
  importFile(file, targetPath, mode){
    const reader=new FileReader();
    reader.onload=()=>{
      try{
        const payload=JSON.parse(String(reader.result||""));
        if(payload?.type!=="thiswin12-export" || !payload?.node) throw new Error("Not a ThisWin12 export");
        targetPath=VFS.normPath(targetPath);
        const target=VFS.getNode(targetPath);
        if(!target || target.t!=="d") throw new Error("Target must be an existing folder");
        if(payload.node.t==="f"){
          // import file into folder using original name from rootPath
          const name=(String(payload.rootPath||"").split("/").pop()||"Imported.txt");
          const dst=targetPath+"/"+name;
          if(mode==="merge" && VFS.getNode(dst)) { Toast.show("Import skipped (exists): "+name); return; }
          VFS.writeFile(dst, payload.node.data||"", payload.node.mime||"text/plain");
        }else{
          // import folder contents into target folder
          VFS.mergeIntoDir(target, payload.node, mode);
          OS.saveAll();
        }
        if(payload.reg){
          // optional: merge reg users/settings/chat/browser (overwrite settings, merge users by id)
          const r=payload.reg;
          OS.reg.settings=Object.assign(OS.reg.settings||{}, r.settings||{});
          OS.settings=Object.assign(OS.settings, OS.reg.settings);
          OS.reg.browser=Object.assign(OS.reg.browser||{}, r.browser||{});
          OS.reg.chat=Object.assign(OS.reg.chat||{}, r.chat||{});
          // users: merge by id, skip conflicts by username
          const byId=new Map((OS.reg.users||[]).map(u=>[u.id,u]));
          (r.users||[]).forEach(u=>{
            if(byId.has(u.id)) return;
            if((OS.reg.users||[]).some(x=>String(x.username).toLowerCase()===String(u.username).toLowerCase())) return;
            OS.reg.users.push(u);
          });
          OS.saveAll();
        }
        Toast.show("Import complete.");
        Explorer.refreshDesktop();
      }catch(e){
        Toast.show("Import failed: "+(e.message||"bad file"));
      }
    };
    reader.readAsText(file);
  }
};

/* ========= Explorer (Shell) ========= */
const Explorer={
  pid:null, shellEl:null,
  start(){Explorer.pid=Proc.start("explorer.exe",Explorer._run);},
  stop(){
    if(!Explorer.pid) return;
    Proc.stop(Explorer.pid);
    Explorer.pid=null;
    OS.root.innerHTML="";
    OS.root.className="kern";
    OS.root.appendChild(Object.assign(document.createElement("div"),{className:"kern"}));
  },
  _run(args,pid){
    OS.root.className="";
    OS.root.innerHTML="";
    const shell=document.createElement("div");
    shell.className="shell";
    shell.innerHTML=`<div class="wall"></div><div class="noise"></div>`;
    OS.root.appendChild(shell);
    Explorer.shellEl=shell;
    if(!OS.session.user) Explorer.showLogin();
    else Explorer.showDesktop();
  },
  _home(){const u=OS.session.user;return u?`C:/Users/${u.username}`:"";},
  _desktopPath(){return Explorer._home()+"/Desktop";},
  _recPath(){return Explorer._home()+"/Recommended-files";},
  _glyphFor(name){
    const ex=extOf(name);
    if(ex===".txt") return "📝";
    if(ex===".webpagefile") return "🌐";
    if(ex===".mp3") return "🎵";
    if(ex===".mp4") return "🎬";
    if(ex===".png"||ex===".jpg"||ex===".jpeg") return "🖼️";
    return "📄";
  },
  // ---- Create File / Folder Popup ----
  _createPrompt(dirPath, isFolder = false){
    const m = document.createElement("div");
    m.className = "modal";
    m.innerHTML = `
      <div class="box glass card">
        <div style="font-weight:800">
          Create ${isFolder ? "Folder" : "File"}
        </div>
        <div class="small mono">${dirPath}</div>
        <div class="sep"></div>
        <input class="input mono" id="name"
          placeholder="${isFolder ? "New Folder" : "NewFile.txt"}"/>
        <div class="hrow" style="justify-content:flex-end">
          <button class="btn" data-a="cancel">Cancel</button>
          <button class="btn primary" data-a="ok">Create</button>
        </div>
      </div>
    `;
    Explorer.shellEl.appendChild(m);

    const nameEl = m.querySelector("#name");
    nameEl.focus();

    const create = () => {
      const name = nameEl.value.trim();
      if (!name) return Toast.show("Name required");

      try {
        const full = dirPath + "/" + name;
        if (isFolder) VFS.mkdir(full);
        else VFS.writeFile(full, "", "text/plain");

        m.remove();
        Toast.show("Created");
        Explorer.refreshDesktop();
      } catch (e) {
        Toast.show(e.message || "Create failed");
      }
    };

    m.addEventListener("click", e => {
      const a = e.target?.dataset?.a;
      if (a === "cancel") m.remove();
      if (a === "ok") create();
    });

    nameEl.addEventListener("keydown", e => {
      if (e.key === "Enter") create();
    });
  },
  _clearOverlays(){
    $$(".modal,.panel,.desktop,.taskbar,.topbar,.win,.ctx",Explorer.shellEl).forEach(n=>n.remove());
    Ctx.close();
    OS.ui.startOpen=false;OS.ui.qsOpen=false;OS.ui.widgetsOpen=false;
  },
  showLogin(){
    Explorer._clearOverlays();
    const m=document.createElement("div");
    m.className="modal";
    const users=OS.reg.users||[];
    m.innerHTML=`
      <div class="box glass card">
        <div class="hrow" style="justify-content:space-between;align-items:flex-start">
          <div>
            <div style="font-weight:800;font-size:18px">ThisWin12</div>
            <div class="small">Sign in to continue</div>
          </div>
          <div class="badge mono">reg.dat</div>
        </div>
        <div class="sep"></div>
        <div class="usergrid" id="ug"></div>
        <div class="sep"></div>
        <div class="hrow" style="justify-content:space-between">
          <div class="small">Tip: type <span class="kbd">file:///C:/Users</span> in File Explorer or Browser.</div>
          <button class="btn primary" id="addUser">Add user</button>
        </div>
      </div>
    `;
    Explorer.shellEl.appendChild(m);
    const ug=$("#ug",m);
    if(!users.length) ug.innerHTML=`<div class="small">No users yet. Create your first account.</div>`;
    users.forEach(u=>{
      const c=document.createElement("div");
      c.className="usercard";
      c.innerHTML=`
        <div class="avatar">${u.icon||"🙂"}</div>
        <div style="min-width:0">
          <div style="font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${escapeHtml(u.username)}</div>
          <div class="small">Click to sign in</div>
        </div>
      `;
      c.addEventListener("click",()=>Explorer._promptPassword(u));
      ug.appendChild(c);
    });
    $("#addUser",m).addEventListener("click",()=>Explorer.showSetup());
    if(!users.length) Explorer.showSetup();
  },
  _promptPassword(user){
    const m=document.createElement("div");
    m.className="modal";
    m.innerHTML=`
      <div class="box glass card">
        <div class="hrow" style="gap:12px">
          <div class="avatar">${user.icon||"🙂"}</div>
          <div>
            <div style="font-weight:800;font-size:16px">${escapeHtml(user.username)}</div>
            <div class="small">Enter password to sign in</div>
          </div>
        </div>
        <div class="sep"></div>
        <div class="vcol">
          <input class="input" id="pw" type="password" placeholder="Password"/>
          <div class="hrow" style="justify-content:flex-end">
            <button class="btn" data-a="cancel">Cancel</button>
            <button class="btn primary" data-a="login">Sign in</button>
          </div>
        </div>
      </div>
    `;
    Explorer.shellEl.appendChild(m);
    const pw=$("#pw",m); pw.focus();
    const go=()=>{
      if(hashPass(pw.value)!==user.passHash) return Toast.show("Wrong password");
      OS.session.user=user;
      OS.reg.currentUserId=user.id;
      OS.saveAll();
      m.remove();
      Explorer.showDesktop();
    };
    m.addEventListener("click",(e)=>{
      const a=e.target?.dataset?.a;
      if(a==="cancel") m.remove();
      if(a==="login") go();
    });
    pw.addEventListener("keydown",(e)=>{if(e.key==="Enter") go();});

  showSetup(){
    const m=document.createElement("div");
    m.className="modal";
    const icons=["🙂","😎","🧠","🪐","🌙","⚡","🧊","🫧","🦋","🧩","🧿","🛰️"];
    m.innerHTML=`
      <div class="box glass card">
        <div class="hrow" style="justify-content:space-between">
          <div>
            <div style="font-weight:800;font-size:18px">Create account</div>
            <div class="small">Stored in reg.dat</div>
          </div>
          <div class="badge mono">setup</div>
        </div>
        <div class="sep"></div>
        <div class="vcol">
          <div class="small">Choose an icon</div>
          <div class="hrow" id="icons" style="flex-wrap:wrap"></div>
          <div class="hrow">
            <div style="width:64px" class="avatar" id="pick">🙂</div>
            <div style="flex:1" class="vcol">
              <input class="input" id="un" placeholder="Username (folder name)"/>
              <input class="input" id="pw" type="password" placeholder="Password"/>
            </div>
          </div>
          <div class="hrow" style="justify-content:flex-end">
            <button class="btn" data-a="cancel">Cancel</button>
            <button class="btn primary" data-a="create">Create</button>
          </div>
          <div class="small">Creates: C:/Users/&lt;Username&gt;/{Desktop,Documents,Recommended-files}</div>
        </div>
      </div>
    `;
    Explorer.shellEl.appendChild(m);
    const iconsEl=$("#icons",m), pick=$("#pick",m), un=$("#un",m), pw=$("#pw",m);
    let chosen="🙂";
    icons.forEach(ic=>{
      const b=document.createElement("button");
      b.className="btn"; b.textContent=ic; b.style.padding="8px 10px"; b.style.borderRadius="14px";
      b.addEventListener("click",()=>{chosen=ic;pick.textContent=ic;});
      iconsEl.appendChild(b);
    });
    const create=()=>{
      const username=(un.value||"").trim();
      const pass=(pw.value||"").trim();
      if(!username) return Toast.show("Username required");
      if(!pass) return Toast.show("Password required");
      if(/[\\:*?"<>|]/.test(username)||username.includes("/")) return Toast.show("Invalid username");
      if((OS.reg.users||[]).some(u=>u.username.toLowerCase()===username.toLowerCase())) return Toast.show("User exists");

      const user={id,username,icon:chosen,passHash:hashPass(pass)};
      OS.reg.users.push(user);
      OS.reg.currentUserId=id;
      OS.session.user=user;

      const base=`C:/Users/${username}`;
      VFS.mkdir(base);
      VFS.mkdir(`${base}/Desktop`);
      VFS.mkdir(`${base}/Documents`);
      VFS.mkdir(`${base}/Recommended-files`);

      VFS.writeFile(`${base}/Desktop/Welcome.txt`,
`Welcome to ThisWin12 — Next Valley Simulator

- Desktop renders from: C:/Users/${username}/Desktop
- Start Recommended pulls from: C:/Users/${username}/Recommended-files
- Try:
  file:///C:/Users/${username}/Desktop

Right-click files for Open / Open with… / Rename / Recommend / Delete.`, "text/plain");

      VFS.writeFile(`${base}/Desktop/NextValley.webpagefile`,`https://example.invalid/nextvalley`,"text/plain");
      VFS.writeFile(`${base}/Desktop/SampleSong.mp3`,`SIMULATED_MEDIA:mp3\nTitle=SampleSong\nArtist=ThisWin12`,"text/plain");
      VFS.writeFile(`${base}/Desktop/SampleVideo.mp4`,`SIMULATED_MEDIA:mp4\nTitle=SampleVideo\nDirector=ThisWin12`,"text/plain");
      VFS.writeFile(`${base}/Documents/Readme.txt`,`Documents folder.\nUse File Explorer Export/Import to move files in/out.`,"text/plain");

        {r:"ai",t:now(),c:"Welcome. This is an offline ChatGPT-style UI inside ThisWin12. Chats are saved locally."}
      ]}];
      OS.reg.browser.bookmarks[id]=OS.reg.browser.bookmarks[id]||["https://example.invalid/nextvalley","file:///C:/Users/"+username+"/Desktop"];
      OS.reg.browser.history[id]=OS.reg.browser.history[id]||[];

      OS.saveAll();
      m.remove();
      Explorer.showDesktop();
    };
    m.addEventListener("click",(e)=>{
      const a=e.target?.dataset?.a;
      if(a==="cancel") m.remove();
      if(a==="create") create();
    });
    pw.addEventListener("keydown",(e)=>{if(e.key==="Enter") create();});
  },
  showDesktop(){
    Explorer._clearOverlays();
    const top=Explorer._topbar();
    const desk=Explorer._desktop();
    const tb=Explorer._taskbar();
    Explorer.shellEl.appendChild(top);
    Explorer.shellEl.appendChild(desk);
    Explorer.shellEl.appendChild(tb);
  },
  refreshDesktop(){
    const old=$(".desktop",Explorer.shellEl);
    if(old) old.replaceWith(Explorer._desktop());
    if(OS.ui.startOpen) Explorer.toggleStart(true);
  },
  _desktop(){
    const d=document.createElement("div");
    d.className="desktop";
    const items=(()=>{try{return VFS.list(Explorer._desktopPath());}catch{return []}})();
    items.forEach(it=>{
      const el=document.createElement("div");
      el.className="icon";
      const glyph=document.createElement("div");
      glyph.className="glyph";
      glyph.textContent=it.t==="d"?"📁":Explorer._glyphFor(it.name);
      const label=document.createElement("div");
      label.className="label";
      label.textContent=it.name;
      el.appendChild(glyph);el.appendChild(label);
      const full=Explorer._desktopPath()+"/"+it.name;

      el.addEventListener("dblclick",()=>FileAssoc.openPath(full));
      el.addEventListener("contextmenu",(e)=>{
        e.preventDefault();
        Explorer._fileCtx(e.clientX,e.clientY,full,it);
      });
      d.appendChild(el);

function parseSimMeta(text){
  const meta={};
  String(text||"").split("\n").forEach(line=>{
    const i=line.indexOf("=");
    if(i>0){const k=line.slice(0,i).trim();const v=line.slice(i+1).trim();if(k) meta[k]=v;}
  });
  return meta;
}

function makePanelDraggableByTop(panel){
  const header = panel.querySelector(".hrow");
  if (!header) return;

  let startX, startY, startL, startT;

  header.style.cursor = "grab";
  header.style.userSelect = "none";

  header.addEventListener("mousedown", (e) => {
    e.preventDefault();

    const r = panel.getBoundingClientRect();
    startX = e.clientX;
    startY = e.clientY;
    startL = r.left;
    startT = r.top;

    panel.classList.add("dragging");
    panel.style.transform = "none";

    const onMove = (ev) => {
      panel.style.left = (startL + ev.clientX - startX) + "px";
      panel.style.top  = (startT + ev.clientY - startY) + "px";
    };

    const onUp = () => {
      panel.classList.remove("dragging");
      document.removeEventListener("mousemove", onMove);
      document.removeEventListener("mouseup", onUp);
    };

    document.addEventListener("mousemove", onMove);
    document.addEventListener("mouseup", onUp);
  });
}

/* ========= Boot ========= */
function boot(){
  OS.loadAll();
  const last=OS.reg.currentUserId;
  if(last){
    const u=(OS.reg.users||[]).find(x=>x.id===last);
    if(u) OS.session.user=u;
  }
  Proc.start("file_associations.exe",()=>{},{});
  Explorer.start();
}
boot();

})();
