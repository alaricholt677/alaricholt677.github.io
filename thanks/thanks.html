<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>GFM‑style README renderer</title>
  <style>
    :root {
      color-scheme: dark light;
    }
    * {
      box-sizing: border-box;
    }
    body {
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      margin: 0;
      background: radial-gradient(circle at top, #111827 0, #020617 45%, #000 100%);
      color: #0f172a;
    }
    #stars {
      position: fixed;
      inset: 0;
      z-index: -2;
      pointer-events: none;
    }
    #wrap {
      padding: 24px;
      max-width: 960px;
      margin: 0 auto 40px;
      position: relative;
      z-index: 1;
    }

    /* STAR GAZER HERO */
    #hero {
      position: relative;
      margin: 12px 0 24px;
      padding: 20px 20px 18px;
      border-radius: 18px;
      overflow: hidden;
      background: linear-gradient(135deg, rgba(37, 99, 235, 0.18), rgba(236, 72, 153, 0.18));
      border: 1px solid rgba(148, 163, 184, 0.6);
      box-shadow:
        0 18px 45px rgba(15, 23, 42, 0.75),
        0 0 0 1px rgba(15, 23, 42, 0.8);
      color: #e5e7eb;
      backdrop-filter: blur(18px) saturate(1.4);
    }
    #hero-glow {
      position: absolute;
      inset: -40%;
      background:
        radial-gradient(circle at 10% 0%, rgba(96, 165, 250, 0.45), transparent 55%),
        radial-gradient(circle at 90% 0%, rgba(244, 114, 182, 0.45), transparent 55%),
        radial-gradient(circle at 50% 120%, rgba(52, 211, 153, 0.35), transparent 55%);
      opacity: 0.9;
      mix-blend-mode: screen;
      pointer-events: none;
      z-index: 0;
    }
    #hero-inner {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      gap: 18px;
    }
    #hero-badge {
      width: 64px;
      height: 64px;
      border-radius: 999px;
      background: radial-gradient(circle at 30% 20%, #facc15, #f97316 55%, #b91c1c 100%);
      box-shadow:
        0 0 0 3px rgba(15, 23, 42, 0.9),
        0 0 32px rgba(250, 204, 21, 0.8);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      transform: translateY(0);
      animation: floatStar 4.5s ease-in-out infinite;
    }
    #hero-text-main {
      font-size: 1.6rem;
      font-weight: 650;
      letter-spacing: 0.02em;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    #hero-text-sub {
      margin-top: 4px;
      font-size: 0.95rem;
      color: #cbd5f5;
    }
    #hero-chip-row {
      margin-top: 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      font-size: 0.8rem;
    }
    .hero-chip {
      padding: 4px 9px;
      border-radius: 999px;
      border: 1px solid rgba(148, 163, 184, 0.7);
      background: rgba(15, 23, 42, 0.7);
      color: #e5e7eb;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }
    .hero-chip-dot {
      width: 6px;
      height: 6px;
      border-radius: 999px;
      background: #22c55e;
      box-shadow: 0 0 10px rgba(34, 197, 94, 0.9);
    }
    #hero-ribbon {
      position: absolute;
      top: 12px;
      right: 16px;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      background: rgba(15, 23, 42, 0.9);
      border: 1px solid rgba(148, 163, 184, 0.8);
      color: #e5e7eb;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    #hero-ribbon span.dot {
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: #f97316;
      box-shadow: 0 0 10px rgba(249, 115, 22, 0.9);
    }

    @keyframes floatStar {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }

    h1, h2, h3, h4 {
      margin: 1em 0 0.6em;
      color: #0f172a;
    }
    p {
      margin: 0.6em 0;
      color: #111827;
    }
    a {
      color: #0366d6;
      text-decoration: none;
    }
    a:hover {
      text-decoration: underline;
    }
    code {
      background: #f6f8fa;
      padding: 0.1em 0.3em;
      border-radius: 4px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 0.9em;
    }
    pre {
      background: #0f1115;
      color: #e6edf3;
      padding: 12px;
      border-radius: 8px;
      overflow: auto;
      font-size: 0.9em;
    }
    table {
      border-collapse: collapse;
      margin: 1em 0;
      width: 100%;
      background: #ffffff;
    }
    th, td {
      border: 1px solid #d0d7de;
      padding: 6px 8px;
      text-align: left;
    }
    thead {
      background: #f6f8fa;
    }
    hr {
      border: 0;
      border-top: 1px solid #d8dee4;
      margin: 16px 0;
    }
    ul, ol {
      margin: 0.5em 0 0.5em 1.4em;
    }
    li {
      margin: 0.3em 0;
    }
    img {
      max-width: 100%;
    }
    #content {
      margin-top: 8px;
      background: #ffffff;
      border-radius: 12px;
      padding: 18px 18px 22px;
      box-shadow:
        0 10px 30px rgba(15, 23, 42, 0.25),
        0 0 0 1px rgba(148, 163, 184, 0.4);
    }
    #progress {
      position: fixed;
      left: 0;
      bottom: 0;
      height: 6px;
      background: linear-gradient(90deg, #22c55e, #eab308, #f97316, #ec4899, #6366f1);
      width: 0%;
      transition: width 0.15s ease;
      z-index: 10;
    }
    @media (max-width: 640px) {
      #wrap {
        padding: 16px;
      }
      #hero-inner {
        flex-direction: row;
        align-items: flex-start;
      }
      #hero-badge {
        width: 54px;
        height: 54px;
        font-size: 26px;
      }
      #hero-text-main {
        font-size: 1.3rem;
      }
    }
  </style>
</head>
<body>
  <canvas id="stars"></canvas>

  <div id="wrap">
    <div id="hero">
      <div id="hero-glow"></div>
      <div id="hero-ribbon">
        <span class="dot"></span>
        STAR‑GAZER MODE
      </div>
      <div id="hero-inner">
        <div id="hero-badge">⭐</div>
        <div>
          <div id="hero-text-main">
            Thanks for starring this project
          </div>
          <div id="hero-text-sub">
            You just unlocked the full README view in <strong>GFM‑style</strong> with a little cosmic backdrop.
          </div>
          <div id="hero-chip-row">
            <div class="hero-chip">
              <span class="hero-chip-dot"></span>
              Live README renderer
            </div>
            <div class="hero-chip">
              ✨ Star‑gazer surprise
            </div>
            <div class="hero-chip">
              🪐 Single‑file artifact
            </div>
          </div>
        </div>
      </div>
    </div>

    <div id="content">Loading README...</div>
  </div>

  <div id="progress"></div>

  <script>
    // --- STARFIELD BACKGROUND ---
    const starCanvas = document.getElementById("stars");
    const starCtx = starCanvas.getContext("2d");
    let sw, sh, starPool = [];

    function resizeStars() {
      sw = starCanvas.width = window.innerWidth;
      sh = starCanvas.height = window.innerHeight;
    }
    resizeStars();
    window.addEventListener("resize", resizeStars);

    function initStarPool(count = 220) {
      starPool = [];
      for (let i = 0; i < count; i++) {
        starPool.push({
          x: Math.random() * sw,
          y: Math.random() * sh,
          z: Math.random() * 1.4 + 0.3,
          r: Math.random() * 1.3 + 0.3,
          tw: Math.random() * Math.PI * 2
        });
      }
    }
    initStarPool();

    function drawStarfield() {
      starCtx.clearRect(0, 0, sw, sh);
      for (let s of starPool) {
        const twinkle = 0.6 + Math.sin(s.tw) * 0.35;
        starCtx.globalAlpha = s.z * twinkle;
        starCtx.fillStyle = "#e5e7eb";
        starCtx.beginPath();
        starCtx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        starCtx.fill();

        s.y += s.z * 0.22;
        s.tw += 0.02 + s.z * 0.01;

        if (s.y > sh + 4) {
          s.y = -6;
          s.x = Math.random() * sw;
          s.z = Math.random() * 1.4 + 0.3;
        }
      }
      requestAnimationFrame(drawStarfield);
    }
    drawStarfield();

    // subtle entry flash
    starCanvas.style.filter = "brightness(1.7)";
    setTimeout(() => {
      starCanvas.style.transition = "filter 900ms ease-out";
      starCanvas.style.filter = "brightness(1)";
    }, 120);

    // --- MARKDOWN TO HTML (kept logic, just formatted) ---
    const toHTML = (md) => {
      md = md.replace(/\r/g, "");

      const fence = /(?:^|\n)```(\w+)?\n([\s\S]*?)\n```/g;
      md = md.replace(fence, (m, lang, code) =>
        `\n<pre><code data-lang="${lang || ""}">${code.replace(/[&<>]/g, s => ({
          "&": "&amp;",
          "<": "&lt;",
          ">": "&gt;"
        }[s]))}</code></pre>\n`
      );

      md = md.replace(/^(\-{3,}|\*{3,}|_{3,})$/gm, "<hr>");

      md = md
        .replace(/^###### (.*)$/gm, "<h6>$1</h6>")
        .replace(/^##### (.*)$/gm, "<h5>$1</h5>")
        .replace(/^#### (.*)$/gm, "<h4>$1</h4>")
        .replace(/^### (.*)$/gm, "<h3>$1</h3>")
        .replace(/^## (.*)$/gm, "<h2>$1</h2>")
        .replace(/^# (.*)$/gm, "<h1>$1</h1>");

      md = md.replace(/!\[(.*?)\]\((.*?)\)/g, (m, a, s) =>
        `<img alt="${a}" src="${s}">`
      );

      md = md.replace(/\[(.*?)\]\((.*?)\)/g, (m, t, u) =>
        `<a href="${u}" target="_blank" rel="noopener">${t}</a>`
      );

      md = md
        .replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>")
        .replace(/\*(.+?)\*/g, "<em>$1</em>")
        .replace(/~~(.+?)~~/g, "<del>$1</del>")
        .replace(/`([^`]+?)`/g, (m, c) =>
          `<code>${c.replace(/[&<>]/g, s => ({
            "&": "&amp;",
            "<": "&lt;",
            ">": "&gt;"
          }[s]))}</code>`
        );

      md = md
.replace(/(^|\n)(?:\s*)- \[ \] (.*)/g, '$1<li class="task">☐ $2</li>')
.replace(/(^|\n)(?:\s*)- \[x\] (.*)/gi, '$1<li class="task">☑ $2</li>');

      const listBlocks = [];
      md = md.replace(
        /(^|\n)(\s*)([-*+] .*(\n\2[-*+] .*)*)/g,
        (m, p, indent, blk) => {
          const items = blk
            .split(/\n/)
            .map(l => l.replace(/^\s*[-*+]\s+/, ""))
            .map(x => `<li>${x}</li>`)
            .join("");
          const html = `<ul>${items}</ul>`;
          listBlocks.push(html);
          return p + `§LIST${listBlocks.length - 1}§`;
        }
      );

      md = md.replace(
        /(^|\n)(\s*)(\d+\. .*(\n\2\d+\. .*)*)/g,
        (m, p, indent, blk) => {
          const items = blk
            .split(/\n/)
            .map(l => l.replace(/^\s*\d+\.\s+/, ""))
            .map(x => `<li>${x}</li>`)
            .join("");
          const html = `<ol>${items}</ol>`;
          listBlocks.push(html);
          return p + `§LIST${listBlocks.length - 1}§`;
        }
      );

      const tblBlocks = [];
      md = md.replace(
        /(^|\n)(\|.*\|(?:\n\|.*\|)+)/g,
        (m, p, blk) => {
          const lines = blk.trim().split(/\n/);
          let head = [], align = [], rows = [];

          const isSep = l =>
            /^\s*\|?\s*:?-{3,}:?\s*(\|\s*:?-{3,}:?\s*)+\|?\s*$/.test(l);

          if (lines.length >= 2 && isSep(lines[1])) {
            head = lines[0]
              .trim()
              .replace(/^\||\|$/g, "")
              .split(/\s*\|\s*/);

            align = lines[1]
              .trim()
              .replace(/^\||\|$/g, "")
              .split(/\s*\|\s*/)
              .map(c =>
                c.startsWith(":") && c.endsWith(":")
                  ? "center"
                  : c.endsWith(":")
                  ? "right"
                  : c.startsWith(":")
                  ? "left"
                  : "left"
              );

            rows = lines
              .slice(2)
              .map(r =>
                r
                  .trim()
                  .replace(/^\||\|$/g, "")
                  .split(/\s*\|\s*/)
              );
          } else {
            head = [];
            rows = lines.map(r =>
              r
                .trim()
                .replace(/^\||\|$/g, "")
                .split(/\s*\|\s*/)
            );
          }

          const thead = head.length
            ? `<thead><tr>${head
                .map((h, i) => `<th style="text-align:${align[i] || "left"}">${h}</th>`)
                .join("")}</tr></thead>`
            : "";

          const tbody = `<tbody>${rows
            .map(r =>
              `<tr>${r
                .map((c, i) => `<td style="text-align:${align[i] || "left"}">${c}</td>`)
                .join("")}</tr>`
            )
            .join("")}</tbody>`;

          const html = `<table>${thead}${tbody}</table>`;
          tblBlocks.push(html);
          return p + `§TABLE${tblBlocks.length - 1}§`;
        }
      );

      md = md
        .replace(/\n{2,}/g, "\n\n")
        .replace(
          /(^|\n)(?!<h\d|<ul>|<ol>|<pre>|<table>|<hr>|§TABLE|§LIST)([^\n]+)(?=\n|$)/g,
          (m, p, txt) => p + `<p>${txt.trim()}</p>`
        );

      md = md
        .replace(/§TABLE(\d+)§/g, (m, i) => tblBlocks[+i])
        .replace(/§LIST(\d+)§/g, (m, i) => listBlocks[+i]);

      return md;
    };

    fetch("https://raw.githubusercontent.com/alaricholt677/alaricholt677.github.io/main/README.md")
      .then(r => r.text())
      .then(md => {
        document.getElementById("content").innerHTML = toHTML(md);
      });

    window.addEventListener("scroll", () => {
      const st = document.documentElement.scrollTop || document.body.scrollTop;
      const sh = document.documentElement.scrollHeight - document.documentElement.clientHeight;
      document.getElementById("progress").style.width = (sh ? (st / sh) * 100 : 0) + "%";
    });
  </script>
</body>
</html>
