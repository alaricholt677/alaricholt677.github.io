function json(r,f){try{return r?JSON.parse(r):f}catch{return f}}function uid(p='id'){return p+'_'+Date.now()+'_'+Math.random().toString(36).slice(2,8)}function esc(s){return String(s??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]))}function clamp(v,a,b){return Math.max(a,Math.min(b,v))}function getChat(){return chats.find(c=>c.id===currentChatId)}function setUrl(id,k,v){const o=runtimeUrls.get(id)||{};o[k]=v;runtimeUrls.set(id,o)}function getUrl(id,k,f=''){return(runtimeUrls.get(id)||{})[k]||f}function strip(o){const c=JSON.parse(JSON.stringify(o));(function w(x){if(!x||typeof x!=='object')return;if(Array.isArray(x))return x.forEach(w);for(const k of Object.keys(x)){if(['imageUrl','coverUrl','audioUrl','videoUrl'].includes(k))delete x[k];else w(x[k])}})(c);return c}function save(){localStorage.setItem(CHAT_KEY,JSON.stringify(strip(chats)));localStorage.setItem(ASSET_KEY,JSON.stringify(strip(assets)));localStorage.setItem(NOTE_KEY,JSON.stringify(notes))}

function installSpudzyCapturePatch(){
  if(window.__spudzyCapturePatch)return;
  window.__spudzyCapturePatch=true;
  const originalConnect=AudioNode.prototype.connect;
  AudioNode.prototype.connect=function(dest,...args){
    const ret=originalConnect.call(this,dest,...args);
    try{
      const ctx=this.context;
      const isDestination=dest && (dest===ctx.destination || (dest.constructor&&/AudioDestinationNode/.test(dest.constructor.name)));
      if(isDestination){
        if(!ctx.__spudzyCaptureDest){
          ctx.__spudzyCaptureDest=ctx.createMediaStreamDestination();
          ctx.__spudzyAnalyser=ctx.createAnalyser();
          ctx.__spudzyAnalyser.fftSize=2048;
          ctx.__spudzyAnalyser.smoothingTimeConstant=.72;
        }
        try{originalConnect.call(this,ctx.__spudzyCaptureDest)}catch{}
        try{originalConnect.call(this,ctx.__spudzyAnalyser)}catch{}
        window.__spudzyLastCapture={stream:ctx.__spudzyCaptureDest.stream,analyser:ctx.__spudzyAnalyser,ctx};
      }
    }catch(e){console.warn('Spudzy capture patch warning',e)}
    return ret;
  };
}

async function recordActualSpudzyAudio(a){

  try{window.SpudzyMusicAI.stop&&window.SpudzyMusicAI.stop()}catch{}
  window.__spudzyLastCapture=null;
  const playInfo=await window.SpudzyMusicAI.play({prompt:a.prompt||'',lyrics:a.lyrics||'',signature:a.signature||'spudzy',tts:false});
  let cap=null;
  for(let i=0;i<20;i++){cap=window.__spudzyLastCapture;if(cap?.stream?.getAudioTracks?.().length)break;await new Promise(r=>setTimeout(r,50));}
  if(!cap?.stream?.getAudioTracks?.().length)throw new Error('Could not capture SpudzyMusicAI audio stream.');
  const types=['audio/webm;codecs=opus','audio/webm','video/webm;codecs=opus','video/webm'];
  const mimeType=types.find(t=>MediaRecorder.isTypeSupported(t))||'audio/webm';
  const chunks=[],rec=new MediaRecorder(cap.stream,{mimeType,audioBitsPerSecond:192000});
  rec.ondataavailable=e=>{if(e.data?.size)chunks.push(e.data)};

  setTimeout(()=>{if(rec.state!=='inactive')rec.stop();try{window.SpudzyMusicAI.stop()}catch{}},durationMs+300);

}

async function recordActualSpudzyMp4(a){
  if(!window.SpudzyMusicAI)throw new Error('SpudzyMusicAI is not loaded');
  if(!window.MediaRecorder)throw new Error('MediaRecorder not supported');
  installSpudzyCapturePatch();
  try{window.SpudzyMusicAI.stop&&window.SpudzyMusicAI.stop()}catch{}

  const canvas=document.createElement('canvas');
  canvas.width=1280;canvas.height=720;
  const ctx=canvas.getContext('2d');
  const cover=await loadImage(getUrl(a.id,'coverUrl')||await makeCover(a.prompt,a.signature));

  // This is the actual music-spud engine. The export starts it and captures its Web Audio output.
  window.__spudzyLastCapture=null;
  const playInfo=await window.SpudzyMusicAI.play({prompt:a.prompt||'',lyrics:a.lyrics||'',signature:a.signature||'spudzy',tts:false});

  // Wait briefly for music-spud to build/connect its Web Audio graph.
  let cap=null;
  for(let i=0;i<20;i++){
    cap=window.__spudzyLastCapture;
    if(cap?.stream?.getAudioTracks?.().length)break;
    await new Promise(r=>setTimeout(r,50));
  }
  if(!cap?.stream?.getAudioTracks?.().length)throw new Error('Could not capture the real SpudzyMusicAI audio stream. The music-spud graph did not connect to the Web Audio destination.');

  const videoStream=canvas.captureStream(30);
  const mixed=new MediaStream([...videoStream.getVideoTracks(),...cap.stream.getAudioTracks()]);
  const types=['video/mp4;codecs=avc1.42E01E,mp4a.40.2','video/mp4','video/webm;codecs=vp9,opus','video/webm'];

  const rec=new MediaRecorder(mixed,{mimeType,videoBitsPerSecond:6500000,audioBitsPerSecond:192000});
  rec.ondataavailable=e=>{if(e.data?.size)chunks.push(e.data)};
  const bpm=playInfo?.bpm||120,bars=playInfo?.bars||8;
  const durationMs=(bars*4*60/bpm+60/bpm*1.4)*1000;
  const started=performance.now();
  const freq=new Uint8Array(cap.analyser.frequencyBinCount);
  function frame(){
    const t=Math.min(1,(performance.now()-started)/durationMs);
    cap.analyser.getByteFrequencyData(freq);
    drawActualFrame(ctx,canvas.width,canvas.height,cover,a,t,freq);
    if(t<1&&rec.state!=='inactive')requestAnimationFrame(frame);
  }
  const done=new Promise((ok,fail)=>{rec.onerror=()=>fail(rec.error);rec.onstop=ok});
  rec.start(250);
  frame();
  setTimeout(()=>{
    if(rec.state!=='inactive')rec.stop();
    try{window.SpudzyMusicAI.stop()}catch{}
    mixed.getTracks().forEach(t=>t.stop());
  },durationMs+450);
  await done;
  return{url:URL.createObjectURL(new Blob(chunks,{type:mimeType})),extension,mimeType};
}

function roundRect(ctx,x,y,w,h,r,fill){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();if(fill!==undefined)ctx.fillStyle=fill;ctx.fill()}function strokeRoundRect(ctx,x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();ctx.stroke()}function wrapText(ctx,text,x,y,max,lineH,maxLines){let line='',lines=0;for(const word of String(text||'').split(/\s+/)){const test=line?line+' '+word:word;if(ctx.measureText(test).width>max&&line){ctx.fillText(line,x,y);line=word;y+=lineH;lines++;if(lines>=maxLines-1)break}else line=test}if(line&&lines<maxLines)ctx.fillText(line,x,y)}function loadImage(src){return new Promise((ok,fail)=>{const i=new Image();i.onload=()=>ok(i);i.onerror=()=>fail(new Error('cover load failed'));i.src=src})}function makeSafe(t){return String(t||'spudzy').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'').slice(0,70)||'spudzy'}function hashCode(s){let h=0;for(let i=0;i<String(s).length;i++)h=(Math.imul(31,h)+String(s).charCodeAt(i))|0;return h>>>0}function titleFromPrompt(p,f){return(p||f).split(/\s+/).slice(0,6).join(' ')||f}

function parseHtml(raw){let d=String(raw||'').replace(/<br\s*\/?\s*>/gi,'\n');const ta=document.createElement('textarea');ta.innerHTML=d;d=ta.value;const m=d.match(/<!DOCTYPE html>[\s\S]*?<\/html>/i)||d.match(/<html[\s\S]*?<\/html>/i);return m?{html:m[0]}:null}function fixHtml(h){let c=String(h||'');if(!/^<!DOCTYPE html>/i.test(c))c='<!DOCTYPE html>\n'+c;if(c.includes('getElementById("demoCanvas")')&&!/id=["']demoCanvas["']/i.test(c)){c=c.replace('</body>','<section class="section" id="demo"><h2 class="section-title">Live Canvas Demo</h2><div class="canvas-wrap"><canvas id="demoCanvas"></canvas></div></section></body>')}return c}function titleOf(h){return(String(h).match(/<title>(.*?)<\/title>/i)||[])[1]||'index.html'}function downloadHtmlAsset(id){const a=assets.find(x=>x.id===id);if(!a)return;const url=URL.createObjectURL(new Blob([a.html||''],{type:'text/html'}));const link=document.createElement('a');link.href=url;link.download=makeSafe(a.name)+'.html';link.click();setTimeout(()=>URL.revokeObjectURL(url),1000)}

function downloadRuntimeAsset(id,key,ext){const url=getUrl(id,key,'');if(!url)return alert('This asset has not been regenerated yet. Revisit the chat or click Regenerate.');const a=assets.find(x=>x.id===id)||{};const link=document.createElement('a');link.href=url;link.download=makeSafe(a.name||'spudzy-asset')+'.'+ext;link.click()}

function exportAssetsJson(){const clean=strip(assets);const u=URL.createObjectURL(new Blob([JSON.stringify(clean,null,2)],{type:'application/json'}));const a=document.createElement('a');a.href=u;a.download='spudzy-assets.json';a.click();setTimeout(()=>URL.revokeObjectURL(u),1000)}
async function importAssetsJsonFile(e){const f=e.target.files[0];if(!f)return;const arr=JSON.parse(await f.text());if(!Array.isArray(arr))return alert('Assets JSON must be an array.');assets=[...arr,...assets];save();renderAssets();e.target.value=''}
function clearRuntimeAssets(){runtimeUrls.clear();renderAll();alert('Runtime generated links cleared. Revisit a chat or click Regenerate to rebuild them.')}
function renderNotes(){const q=(document.getElementById('notebook-search')?.value||'').toLowerCase(),l=document.getElementById('notebook-list');if(!l)return;const f=notes.filter(n=>!q||JSON.stringify(n).toLowerCase().includes(q));l.innerHTML=f.map(n=>{const i=notes.findIndex(x=>x.id===n.id);return`<div class="flex gap-1 p-1 hover:bg-[#2a2b2f] rounded"><button onclick="previewNote(${i})" class="text-left truncate flex-1">${esc(n.title)}</button><button onclick="openNotebookEditor('${n.id}')" class="text-blue-400"><i class="fa-solid fa-pen"></i></button><button onclick="deleteNotebook(${i})" class="text-red-400"><i class="fa-solid fa-trash"></i></button></div>`}).join('')||'<p class="text-xs text-gray-500">No notes.</p>'}function openNotebookEditor(id=null){editingNote=id;const n=notes.find(x=>x.id===id)||{};document.getElementById('note-title').value=n.title||'';document.getElementById('note-content').value=n.content||'';document.getElementById('note-editor').classList.remove('hidden');document.getElementById('note-editor').classList.add('flex')}function closeNotebookEditor(){document.getElementById('note-editor').classList.add('hidden');document.getElementById('note-editor').classList.remove('flex');editingNote=null}function saveNotebookFromEditor(){const title=document.getElementById('note-title').value||'Untitled',content=document.getElementById('note-content').value;if(editingNote){Object.assign(notes.find(n=>n.id===editingNote),{title,content,updatedAt:Date.now()})}else notes.unshift({id:uid('note'),title,content,createdAt:Date.now(),updatedAt:Date.now()});save();renderNotes();closeNotebookEditor()}function deleteNotebook(i){if(confirm('Delete note?')){notes.splice(i,1);save();renderNotes()}}function previewNote(i){const n=notes[i];document.getElementById('preview-title').textContent=n.title;document.getElementById('preview-body').innerHTML=`<pre class="whitespace-pre-wrap soft p-4 rounded-xl">${esc(n.content)}</pre><button onclick="importText(notes[${i}].content)" class="btn btn-blue mt-3">Import</button>`;document.getElementById('preview').classList.remove('hidden');document.getElementById('preview').classList.add('flex')}function savePromptNote(){const v=document.getElementById('input').value.trim();if(v){notes.unshift({id:uid('note'),title:v.slice(0,40),content:v,createdAt:Date.now()});save();renderNotes()}}function openNotebookImport(){const l=document.getElementById('note-import-list');l.innerHTML=notes.map((n,i)=>`<button onclick="importText(notes[${i}].content)" class="block w-full text-left p-3 hover:bg-[#2a2b2f] border-b border-gray-800"><b>${esc(n.title)}</b><p class="text-xs text-gray-500 truncate">${esc(n.content)}</p></button>`).join('')||'<p class="p-4 text-gray-500">No notes.</p>';document.getElementById('note-import').classList.remove('hidden');document.getElementById('note-import').classList.add('flex')}function closeNotebookImport(){document.getElementById('note-import').classList.add('hidden');document.getElementById('note-import').classList.remove('flex')}function importText(t){const i=document.getElementById('input');i.value=`[Research Data]:\n${t}\n\n${i.value}`;closeNotebookImport();closePreview()}function exportNotebooks(){const u=URL.createObjectURL(new Blob([JSON.stringify(notes,null,2)],{type:'application/json'})),a=document.createElement('a');a.href=u;a.download='spudzy-notebooks.json';a.click();setTimeout(()=>URL.revokeObjectURL(u),1000)}async function importNotebookJsonFile(e){const f=e.target.files[0];if(f){notes=[...JSON.parse(await f.text()),...notes];save();renderNotes()}}
function openWikiModal(){document.getElementById('wiki').classList.remove('hidden');document.getElementById('wiki').classList.add('flex')}function closeWikiModal(){document.getElementById('wiki').classList.add('hidden');document.getElementById('wiki').classList.remove('flex')}async function searchWiki(){const q=document.getElementById('wiki-q').value.trim(),r=document.getElementById('wiki-results');if(!q)return;r.textContent='Searching...';const res=await fetch(`https://en.wikipedia.org/w/api.php?action=query&prop=extracts&exintro&explaintext&titles=${encodeURIComponent(q)}&format=json&origin=*`),data=await res.json(),pages=data.query.pages,id=Object.keys(pages)[0];if(id==='-1')return r.textContent='No result';const title=pages[id].title,content=pages[id].extract||'';r.innerHTML=`<h3 class="font-bold">${esc(title)}</h3><p class="whitespace-pre-wrap text-gray-300">${esc(content)}</p><button id="save-wiki" class="btn btn-blue mt-3">Save</button>`;document.getElementById('save-wiki').onclick=()=>{notes.unshift({id:uid('note'),title,content,source:'wiki',createdAt:Date.now()});save();renderNotes();closeWikiModal()}}
