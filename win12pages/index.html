<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Loading…</title>

<style>
    body {
        margin: 0;
        background: #0d0d0d;
        font-family: Segoe UI, sans-serif;
        color: white;
    }

    #loader {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0d0d0d;
        z-index: 999;
        opacity: 1;
        transition: opacity .4s ease;
    }

    .spinner {
        width: 60px;
        height: 60px;
        border: 6px solid #333;
        border-top-color: #4da3ff;
        border-radius: 50%;
        animation: spin 1s linear infinite;
    }

    @keyframes spin {
        to { transform: rotate(360deg); }
    }

    #appframe {
        width: 100vw;
        height: 100vh;
        border: none;
        background: #0d0d0d;
    }

    .error-box {
        text-align: center;
        padding: 40px;
        background: #1a1a1a;
        border-radius: 12px;
        max-width: 500px;
        margin: 60px auto;
        box-shadow: 0 0 20px rgba(0,0,0,0.4);
        color: white;
        font-family: Segoe UI, sans-serif;
    }

    .error-box h1 {
        font-size: 48px;
        margin-bottom: 10px;
        color: #ff4d4d;
    }

    .error-box p {
        font-size: 18px;
        opacity: .8;
    }
</style>

<script>
async function loadPage() {
    const hash = location.hash.slice(1);
    const frame = document.getElementById("appframe");
    showLoader(true);

    try {
        // ⭐ FIXED: Correct JSON path
        const pages = await fetch("pages.json").then(r => r.json());

        let entry = pages.pages[hash];
        if (!entry) return show404();

        if (entry["url-to-hide-html-url"]) {
            const helper = pages.pages[entry["url-to-hide-html-url"]];
            if (helper) entry = helper;
            else return show404();
        }

        const target = entry.url || entry.fileurl;
        if (!target) return show404();

        const res = await fetch(target);
        if (!res.ok) return show404();

        const html = await res.text();
        frame.srcdoc = html;

    } catch {
        show404();
    }

    showLoader(false);
}

function show404() {
    const frame = document.getElementById("appframe");

    frame.srcdoc = `
        <div class="error-box">
            <h1>404</h1>
            <p>The page you're looking for doesn't exist.</p>
        </div>
    `;

    showLoader(false);
}

function showLoader(state) {
    const loader = document.getElementById("loader");
    loader.style.opacity = state ? "1" : "0";
    if (!state) setTimeout(() => loader.style.display = "none", 400);
}

window.addEventListener("hashchange", loadPage);
window.addEventListener("DOMContentLoaded", loadPage);
</script>

</head>
<body>

<div id="loader">
    <div class="spinner"></div>
</div>

<iframe id="appframe" sandbox="allow-scripts allow-same-origin"></iframe>

</body>
</html>
