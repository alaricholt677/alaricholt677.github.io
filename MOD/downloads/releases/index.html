<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Releases</title>
<style>
body{margin:0;font-family:system-ui;background:#0e0e11;color:#eaeaf0;display:flex}
nav{width:220px;background:#15151c;padding:20px}
nav h2{margin-top:0}
nav a{display:block;color:#9aa0ff;text-decoration:none;margin:10px 0}
main{flex:1;padding:24px}
aside{width:320px;background:#111118;padding:20px;overflow-y:auto}
.article img{width:100%;border-radius:6px}
button{background:#4b5cff;color:white;border:none;padding:8px 14px;border-radius:6px;cursor:pointer}
button:hover{background:#6a78ff}
</style>
</head>
<body>

<nav>
<h2>MOD</h2>
<a href="/MOD/">Home</a>
<a href="/MOD/downloads/">Downloads</a>
<a href="/MOD/downloads/releases/">Releases</a>
<a href="/MOD/downloads/snapshots/">Snapshots</a>
<hr>
<a href="/">Windows 12 Simulator</a>
<a href="/thanks/thanks.html">Thanks</a>
</nav>

<main>
<h1>Releases</h1>
<div id="list"></div>

<script>
fetch('releases.json')
.then(r=>r.json())
.then(d=>{
const base=location.href.replace('index.html','');
d.entries.forEach(e=>{
list.innerHTML+=`
<h3>${e.version}</h3>
<p>Minecraft ${e.mc} • ${e.loader}</p>
<p>${e.notes||''}</p>
<button onclick="dl('${base+e.file}')">Download</button>
<hr>`;
});
});
function dl(u){
const a=document.createElement('a');
a.href=u;
a.download='';
a.click();
}
</script>
</main>

<aside>
<h3>Latest News</h3>
<div id="news"></div>
<script>
fetch('https://alaricholt677.github.io/news/news.json')
.then(r=>r.json())
.then(d=>{
d.articles.slice(0,4).forEach(a=>{
news.innerHTML+=`
<div class="article">
<img src="${a.imageURL}">
<h4>${a.name}</h4>
<small>${a.date}</small>
<p>${a.content.substring(0,120)}...</p>
</div>`;
});
});
</script>
</aside>

</body>
</html>
