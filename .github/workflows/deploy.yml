name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject YouTube API key
        run: |
          if [ -z "${{ secrets.YOUTUBE_API_KEY }}" ]; then
            echo "YOUTUBE_API_KEY secret is empty or missing"
            exit 1
          fi

          find . \( -name "spudzy.js" -o -name "index.html" \) -type f -print -exec sed -i "s|__YOUTUBE_API_KEY__|${{ secrets.YOUTUBE_API_KEY }}|g" {} \;

          if grep -R "__YOUTUBE_API_KEY__" PKGS/spudzy --include="spudzy.js" --include="index.html"; then
            echo "Placeholder still exists in PKGS/spudzy"
            exit 1
          fi

          echo "Placeholder replaced in Spudzy files"
      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
