<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Win12Pages</title>

<style>
    body {
        margin: 0;
        background: #0d0d0d;
        font-family: Segoe UI, sans-serif;
        color: white;
    }

    #loader {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0d0d0d;
        z-index: 999;
        opacity: 1;
        transition: opacity .4s ease;
    }

    .spinner {
        width: 60px;
        height: 60px;
        border: 6px solid #333;
        border-top-color: #4da3ff;
        border-radius: 50%;
        animation: spin 1s linear infinite;
    }

    @keyframes spin {
        to { transform: rotate(360deg); }
    }

    #app {
        padding: 20px;
        animation: fadeIn .4s ease;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .error-box {
        text-align: center;
        padding: 40px;
        background: #1a1a1a;
        border-radius: 12px;
        max-width: 500px;
        margin: 60px auto;
        box-shadow: 0 0 20px rgba(0,0,0,0.4);
    }

    .error-box h1 {
        font-size: 48px;
        margin-bottom: 10px;
        color: #ff4d4d;
    }

    .error-box p {
        font-size: 18px;
        opacity: .8;
    }
</style>

<script>
const repo = "/win12pages/";

// Check if file exists WITHOUT downloading GitHub's 404
async function safeExists(url) {
    try {
        const res = await fetch(url, { method: "HEAD" });
        return res.ok;
    } catch {
        return false;
    }
}

async function loadPage() {
    const hash = location.hash.slice(1);
    if (!hash) return;

    showLoader(true);

    try {
        const pages = await fetch(repo + "pages.json").then(r => r.json());

        let entry = pages.pages[hash];
        if (!entry) return show404();

        if (entry["url-to-hide-html-url"]) {
            const helper = pages.pages[entry["url-to-hide-html-url"]];
            if (helper) entry = helper;
            else return show404();
        }

        const target = entry.url || entry.fileurl;
        if (!target) return show404();

        const finalURL = repo + target.replace(/^\/+/, "");

        // Check existence BEFORE fetching
        const exists = await safeExists(finalURL);
        if (!exists) return show404();

        const html = await fetch(finalURL).then(r => r.text());
        document.getElementById("app").innerHTML = html;

    } catch {
        show404();
    }

    showLoader(false);
}

async function show404() {
    const html = `
        <div class="error-box">
            <h1>404</h1>
            <p>The page you're looking for doesn't exist.</p>
        </div>
    `;
    document.getElementById("app").innerHTML = html;
    showLoader(false);
}

function showLoader(state) {
    const loader = document.getElementById("loader");
    if (state) {
        loader.style.opacity = "1";
        loader.style.pointerEvents = "auto";
    } else {
        loader.style.opacity = "0";
        setTimeout(() => loader.style.pointerEvents = "none", 400);
    }
}

window.addEventListener("hashchange", loadPage);
window.addEventListener("DOMContentLoaded", loadPage);
</script>

</head>
<body>

<div id="loader">
    <div class="spinner"></div>
</div>

<div id="app">
    <h1>Welcome</h1>
    <p>Use #2 or any page defined in pages.json.</p>
</div>

</body>
</html>
